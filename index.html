// Cache timbrature per calendari multipli (possono mostrare mesi diversi dal filtro)
window._cacheTimbrMese = {};

window.caricaTimbratureMese = caricaTimbratureMese;
async function caricaTimbratureMese(meseStr) {
  // meseStr = "2026-02"
  if(window._cacheTimbrMese[meseStr]) return window._cacheTimbrMese[meseStr];
  const [anno, mese] = meseStr.split("-");
  const dal = `${anno}-${mese}-01`;
  const al  = `${anno}-${mese}-31`;
  try {
    const q = query(collection(db,"timbrature"), where("data",">=",dal), where("data","<=",al));
    const snap = await getDocs(q);
    const risultati = snap.docs.map(d=>({id:d.id,...d.data()}));
    window._cacheTimbrMese[meseStr] = risultati;
    // Aggiorna anche state.timbrature se è lo stesso anno del filtro corrente
    if(parseInt(anno) === state.filtroAnno) {
      // Integra i nuovi dati in state.timbrature (evita duplicati)
      const idsEsistenti = new Set(state.timbrature.map(t=>t.id));
      risultati.forEach(t=>{ if(!idsEsistenti.has(t.id)) state.timbrature.push(t); });
    }
    return risultati;
  } catch(e) { return []; }
}

function getTimbrMeseCalendario(meseStr, dipId) {
  // Se il mese coincide con il filtro corrente, usa state.timbrature già caricato
  const meseCorrente = `${state.filtroAnno}-${String(state.filtroMese+1).padStart(2,"0")}`;
  if(meseStr === meseCorrente) {
    return dipId ? state.timbrature.filter(t=>t.dipendenteId===dipId) : state.timbrature;
  }
  // Altrimenti usa la cache
  const cached = window._cacheTimbrMese[meseStr] || [];
  return dipId ? cached.filter(t=>t.dipendenteId===dipId) : cached;
}

function renderCalendarioMultiplo(prefisso) {
  const meseEl = document.getElementById(`${prefisso}-mese-multiplo`);
  const meseVal = meseEl?.value || (new Date().getFullYear()+"-"+String(new Date().getMonth()+1).padStart(2,"0"));
  const [anno, meseN] = meseVal.split("-").map(Number);
  const mese = meseN - 1; // 0-based
  const primoGiorno = new Date(anno, mese, 1).getDay();
  const giorniMese = new Date(anno, mese+1, 0).getDate();
  const giorni=["Lu","Ma","Me","Gi","Ve","Sa","Do"];
  let html=`<div style="font-size:13px;font-weight:700;color:#374151;margin-bottom:8px;text-align:center">${MESI[mese]} ${anno}</div>`;
  html+=`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center">`;
  giorni.forEach(g=>html+=`<div style="font-size:11px;font-weight:700;color:#9ca3af;padding:3px">${g}</div>`);
  const offset=(primoGiorno+6)%7;
  for(let i=0;i<offset;i++) html+=`<div></div>`;
  const set=window._dateSelezionate?.[prefisso]||new Set();
  for(let g=1;g<=giorniMese;g++){
    const ds=`${anno}-${String(mese+1).padStart(2,"0")}-${String(g).padStart(2,"0")}`;
    const sel=set.has(ds);
    // Controlla timbrature esistenti per questo giorno
    const dipIdMulti = prefisso==="admin"
      ? (document.getElementById("ai-dip")?.value || document.getElementById("ir-dip")?.value || null)
      : state.dipendente?.id || null;
    const timbrGiorno = dipIdMulti
      ? getTimbrMeseCalendario(meseVal, dipIdMulti).filter(t => t.data===ds)
      : [];
    const haLavoro  = timbrGiorno.some(t => t.tipo==="lavoro");
    const haAssenza = timbrGiorno.some(t => t.tipo==="assenza");
    const bgExist = haLavoro ? "#dcfce7" : haAssenza ? "#ffedd5" : "white";
    const borderExist = haLavoro ? "#86efac" : haAssenza ? "#fdba74" : "#e5e7eb";
    const dotExist = haLavoro ? `<div style="font-size:7px;color:#16a34a;line-height:1">●</div>` : haAssenza ? `<div style="font-size:7px;color:#ea580c;line-height:1">●</div>` : "";
    html+=`<div id="${prefisso}-giorno-${ds}" onclick="toggleGiorno('${prefisso}','${ds}')" style="cursor:pointer;padding:5px 2px;border-radius:6px;font-size:13px;border:1px solid ${sel?"#f59e0b":borderExist};background:${sel?"#f59e0b":bgExist};color:${sel?"white":"inherit"};text-align:center" data-data="${ds}">${g}${dotExist}</div>`;
  }
  const dateList=[...set].sort().filter(d=>d.startsWith(`${anno}-${String(mese+1).padStart(2,"0")}`));
  html+=`</div><div style="display:flex;gap:10px;margin-top:6px;font-size:11px;color:#6b7280;flex-wrap:wrap">
    <span><span style="display:inline-block;width:10px;height:10px;background:#dcfce7;border:1px solid #86efac;border-radius:2px;margin-right:3px"></span>Lavoro</span>
    <span><span style="display:inline-block;width:10px;height:10px;background:#ffedd5;border:1px solid #fdba74;border-radius:2px;margin-right:3px"></span>Assenza</span>
    <span><span style="display:inline-block;width:10px;height:10px;background:#f59e0b;border:1px solid #f59e0b;border-radius:2px;margin-right:3px"></span>Selezionato</span>
  </div>
  <div id="${prefisso}-date-selezionate" style="margin-top:8px;font-size:12px;color:#6b7280">${set.size>0?`${set.size} date selezionate: ${[...set].sort().join(", ")}`:"Nessuna data selezionata"}</div>`;
  return html;
}

window._dateSelezionate={dip:new Set(),admin:new Set()};

window.aggiornaMeseMultiplo=async function(prefisso){
  window._dateSelezionate[prefisso]=new Set();
  const meseEl = document.getElementById(`${prefisso}-mese-multiplo`);
  const meseVal = meseEl?.value || (new Date().getFullYear()+"-"+String(new Date().getMonth()+1).padStart(2,"0"));
  await caricaTimbratureMese(meseVal); // precarica cache
  const el=document.getElementById(`${prefisso}-calendario-multiplo`);
  if(el) el.innerHTML=renderCalendarioMultiplo(prefisso);
};

window.toggleGiorno=function(prefisso,data){
  const set=window._dateSelezionate[prefisso];
  const el=document.getElementById(`${prefisso}-giorno-${data}`);
  if(!el) return;
  if(set.has(data)){set.delete(data);el.style.background="white";el.style.color="inherit";el.style.borderColor="#e5e7eb";}
  else{set.add(data);el.style.background="#f59e0b";el.style.color="white";el.style.borderColor="#f59e0b";}
  const info=document.getElementById(`${prefisso}-date-selezionate`);
  if(info) info.textContent=set.size>0?`${set.size} date selezionate: ${[...set].sort().join(", ")}`:"Nessuna data selezionata";
};

window.toggleModoAssenza=function(prefisso){
  const modo=document.getElementById(`${prefisso==="dip"?"inp":"ai"}-modo-assenza`)?.value;
  const s=document.getElementById(`${prefisso}-assenza-singola`);
  const i=document.getElementById(`${prefisso}-assenza-intervallo`);
  const m=document.getElementById(`${prefisso}-assenza-multipla`);
  if(s) s.style.display=modo==="singola"?"grid":"none";
  if(i) i.style.display=modo==="intervallo"?"block":"none";
  if(m) m.style.display=modo==="multipla"?"block":"none";
  if(modo==="multipla") window._dateSelezionate[prefisso]=new Set();
};

function dateIntervallo(da,a){
  const dates=[]; 
  const cur=new Date(da+"T12:00:00"); 
  const fine=new Date(a+"T12:00:00");
  while(cur<=fine){
    const ds=cur.toISOString().split("T")[0];
    const dow=cur.getDay();
    // Escludi domeniche (0) e festivi
    if(dow!==0 && !isFestivo(ds)) dates.push(ds);
    cur.setDate(cur.getDate()+1);
  }
  return dates;
}

function getDateAssenza(prefisso){
  const modoId=prefisso==="dip"?"inp-modo-assenza":"ai-modo-assenza";
  const modo=document.getElementById(modoId)?.value||"singola";
  if(modo==="singola"){const id=prefisso==="dip"?"inp-data-assenza":"ai-data-assenza";const v=document.getElementById(id)?.value;return v?[v]:[];}
  if(modo==="intervallo"){
    const da=document.getElementById(`${prefisso==="dip"?"inp":"ai"}-data-ass-da`)?.value;
    const a=document.getElementById(`${prefisso==="dip"?"inp":"ai"}-data-ass-a`)?.value;
    if(!da||!a||da>a){alert("Intervallo date non valido!");return [];}
    return dateIntervallo(da,a);
  }
  if(modo==="multipla"){const dates=[...window._dateSelezionate[prefisso]].sort();if(!dates.length){alert("Seleziona almeno una data!");return [];}return dates;}
  return [];
}

        ${filtriHTML()}
      </div>
      <div class="info-box" style="margin-bottom:16px">
        <p>&#8226; <strong>Surplus</strong>: ore lavorate oltre la soglia giornaliera</p>
        <p>&#8226; <strong>Deficit</strong>: ore mancanti rispetto alla soglia</p>
        <p>&#8226; Ferie, Permesso, Malattia e Riposo Comp. contano come ore standard (saldo neutro)</p>
        <p>&#8226; Giorno Libero e domeniche non incidono sulla banca ore</p>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center">

        <button onclick="window.setBancaOreModo(true)" style="padding:4px 12px;border-radius:6px;border:1px solid #e5e7eb;font-size:12px;cursor:pointer;font-weight:600;background:${window._bancaOreMultiMese?'#7c3aed':'white'};color:${window._bancaOreMultiMese?'white':'#374151'}">Cumulativo anno</button>
        ${window._bancaOreMultiMese?`<span style="font-size:11px;color:#6b7280">Saldo da Gennaio a ${MESI[state.filtroMese]} ${state.filtroAnno}</span>`:""}
      </div>
      <div class="bancaore-cards" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-bottom:24px">
        ${(window._bancaOreMultiMese ? dipAttivi.map(d=>calcolaBancaOreMultiMese(d.id)).filter(Boolean) : bancheOre).map(b => {
          const sc = b.saldo > 0 ? "#dc2626" : b.saldo < 0 ? "#059669" : "#6b7280";
          const sbg = b.saldo > 0 ? "#fef2f2" : b.saldo < 0 ? "#f0fdf4" : "#f9fafb";
          const sbr = b.saldo > 0 ? "#fecaca" : b.saldo < 0 ? "#bbf7d0" : "#e5e7eb";

            <div style="font-weight:700;font-size:13px;margin-bottom:8px">${b.dip.nome}
              <span style="font-weight:400;color:#6b7280;font-size:11px"> — soglia ${(b.soglia/60).toFixed(2)}h/g</span>

              <div style="background:white;border-radius:8px;padding:8px;border:1px solid #e5e7eb">
                <div style="font-size:13px;font-weight:700;color:#059669">-${minToHHMM(b.totaleDeficit)}</div>
                <div style="font-size:10px;color:#6b7280">Deficit</div>

              <div style="background:white;border-radius:8px;padding:8px;border:1px solid ${sbr}">
                <div style="font-size:13px;font-weight:700;color:${sc}">${icon} ${b.saldo>=0?"+":""}${minToHHMM(Math.abs(b.saldo))}</div>

      </div>
      ${bancheOre.map(b => {

              <tbody>
              ${b.dettaglioGiorni.map(g => {
                const dow = new Date(g.data).getDay();
                const isFest = isFestivo(g.data);

                return `<tr style="background:${rowbg}">
                  <td style="font-weight:600;font-size:12px">${g.data}</td>
                  <td style="font-size:11px">${giorniSettimana[dow]}${isFest?" 🎉":""}</td>

                    ? `<span class="badge badge-blue">${g.assenza}</span>`

                      : `<span class="badge badge-green">Lavoro</span>`}

                  <td style="font-weight:600">${minToHHMM(g.oreMin)}h</td>
