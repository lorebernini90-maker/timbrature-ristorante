<style>

body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; min-height: 100vh; }

.cost-total { display: flex; justify-content: space-between; align-items: center; padding: 10px 0 0; font-size: 15px; font-weight: 700; border-top: 2px solid #e5e7eb; margin-top: 6px; }

<body>
<div id="app"><div class="loading"><div class="spinner"></div>Caricamento...</div></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const ADMIN_PIN = "1234";
const VOCI_ASSENZA = ["Ferie","Permesso","Malattia","Riposo Compensativo"];
const MESI = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];

// ── MAGGIORAZIONI ─────────────────────────────────────────────
const MAGGIORAZIONI = {
  strDiurno: 0.30,
  strNotturno: 0.60,
  ordinarioNotturno: 0.25,
  domenica: 0.10,
  festivo: 0.20,
};

// ── FESTIVI ───────────────────────────────────────────────────
function getPassqua(anno) {
  const a=anno%19, b=Math.floor(anno/100), c=anno%100;
  const d=Math.floor(b/4), e=b%4, f=Math.floor((b+8)/25);
  const g=Math.floor((b-f+1)/3), h=(19*a+b-d-g+15)%30;
  const i=Math.floor(c/4), k=c%4, l=(32+2*e+2*i-h-k)%7;
  const m=Math.floor((a+11*h+22*l)/451);
  const mese=Math.floor((h+l-7*m+114)/31);
  const giorno=((h+l-7*m+114)%31)+1;
  return new Date(anno, mese-1, giorno);
}

function isFestivo(dataStr) {
  const d = new Date(dataStr);
  const anno = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const gg = String(d.getDate()).padStart(2,"0");
  const mmgg = `${mm}-${gg}`;

  // Festivi fissi
  const fissi = ["01-01","04-25","05-01","06-02","06-24","08-15","11-01","12-08","12-25","12-26"];
  if(fissi.includes(mmgg)) return true;

  // Pasqua
  const pasqua = getPassqua(anno);
  const pasquetta = new Date(pasqua); pasquetta.setDate(pasqua.getDate()+1);
  if(d.toDateString()===pasqua.toDateString()) return true;
  if(d.toDateString()===pasquetta.toDateString()) return true;

  return false;
}

function isDomenica(dataStr) {
  return new Date(dataStr).getDay() === 0;
}

function getTipoGiorno(dataStr) {
  if(isFestivo(dataStr)) return "festivo";
  if(isDomenica(dataStr)) return "domenica";
  return "normale";
}

const firebaseConfig = {
  apiKey: "AIzaSyBx2VqiSLGTjWBR7s0lf96cYro1pUfTv08",
  authDomain: "timbrature-ristorante.firebaseapp.com",
  projectId: "timbrature-ristorante",
  storageBucket: "timbrature-ristorante.firebasestorage.app",
  messagingSenderId: "860258208491",
  appId: "1:860258208491:web:acab2683716fb4161b4cae"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

let state = {
  vista: "loading", utenteCorrente: null,
  dipendenti: [], timbrature: [],
  dipTab: "timbra", adminTab: "presenze",
  filtroMese: new Date().getMonth(), filtroAnno: new Date().getFullYear(),
  modaleDip: null, modaleTimbratura: null,
};

function timeToMin(t) { if(!t) return 0; const [h,m]=t.split(":").map(Number); return h*60+m; }
function minToHHMM(min) { if(!min||min<=0) return "0:00"; return `${Math.floor(min/60)}:${String(min%60).padStart(2,"0")}`; }
function oggi() { return new Date().toISOString().split("T")[0]; }
function oraNow() { const n=new Date(); return `${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")}`; }
function euro(n) { return `€ ${(n||0).toFixed(2)}`; }

function calcolaTurno(entrata, uscita, pausa, sogliaMinuti) {
  if(!entrata||!uscita) return null;
  const e=timeToMin(entrata); let u=timeToMin(uscita);
  if(u<e) u+=1440;
  const pausaNum=parseInt(pausa)||0;
  const tot=u-e-pausaNum;
  const soglia=sogliaMinuti||400;
  const str=Math.max(0,tot-soglia);
  const N1=23*60,N2=6*60; let nott=0;
  if(u>N1) nott+=Math.min(u,1440)-Math.max(e,N1);
  if(u>1440) nott+=Math.min(u-1440,N2);
  nott=Math.max(0,nott);
  const diur=Math.max(0,tot-nott);
  const strN=Math.min(str,nott), strD=Math.max(0,str-strN);
  const ordNott=Math.max(0,nott-strN);
  return {totaleMin:tot,diurneMin:diur,notturneMin:nott,straordinariMin:str,strDiurniMin:strD,strNotturniMin:strN,ordNottMin:ordNott};
}

function sogliaMinutiDip(dip) {
  if(dip.sogliaOre) return Math.round(dip.sogliaOre*60);
  return 400;
}

// ── CALCOLO COSTO CON MAGGIORAZIONI ──────────────────────────
function calcolaCostoTurno(timb, dip) {
  if(!timb.calcolo||!dip.tariffaOraria) return null;
  const tariffa=dip.tariffaOraria;
  const c=timb.calcolo;
  const tipo=getTipoGiorno(timb.data);

  const oreOrdDiurne=(c.diurneMin-c.strDiurniMin)/60;
  const oreStrDiurni=c.strDiurniMin/60;
  const oreStrNott=c.strNotturniMin/60;
  const oreOrdNott=(c.ordNottMin||0)/60;

  // Costo base
  const costoOrdDiurno=oreOrdDiurne*tariffa;
  const costoStrDiurno=oreStrDiurni*tariffa*(1+MAGGIORAZIONI.strDiurno);
  const costoStrNott=oreStrNott*tariffa*(1+MAGGIORAZIONI.strNotturno);
  const costoOrdNott=oreOrdNott*tariffa*(1+MAGGIORAZIONI.ordinarioNotturno);

  // Maggiorazione domenica/festivo sulle ore ordinarie diurne
  let costoMaggiorazione=0;
  if(tipo==="domenica") costoMaggiorazione=oreOrdDiurne*tariffa*MAGGIORAZIONI.domenica;
  if(tipo==="festivo") costoMaggiorazione=(oreOrdDiurne+oreOrdNott)*tariffa*MAGGIORAZIONI.festivo;

  const totale=costoOrdDiurno+costoStrDiurno+costoStrNott+costoOrdNott+costoMaggiorazione;

  return {
    oreOrdDiurne, oreStrDiurni, oreStrNott, oreOrdNott,
    costoOrdDiurno, costoStrDiurno, costoStrNott, costoOrdNott,
    costoMaggiorazione, totale, tipo,
    tariffa
  };
}

function calcolaCostoAssenzeMensili(dipId) {
  const dip = state.dipendenti.find(d => d.id === dipId);
  if(!dip?.tariffaOraria) return null;
  const oreDip = sogliaMinutiDip(dip) / 60;
  const assenze = getTimbMese().filter(t => t.dipendenteId === dipId && t.tipo === "assenza");
  const dettaglio = {};
  VOCI_ASSENZA.forEach(v => {
    const giorni = assenze.filter(a => a.assenza === v).length;
    dettaglio[v] = { giorni, ore: giorni * oreDip, costo: giorni * oreDip * dip.tariffaOraria };
  });
  const totaleGiorni = assenze.length;
  const totaleOre = totaleGiorni * oreDip;
  const totaleCosto = totaleOre * dip.tariffaOraria;
  return { dettaglio, totaleGiorni, totaleOre, totaleCosto, oreDip, tariffa: dip.tariffaOraria };
}

  let totOrdDiurne=0, totStrDiurni=0, totStrNott=0, totOrdNott=0;
  let costoOrdDiurno=0, costoStrDiurno=0, costoStrNott=0, costoOrdNott=0;
  let costoMaggDom=0, costoMaggFest=0, totale=0;
  let giorniFestivi=0, giorniDomenica=0;

  turni.forEach(t=>{
    const r=calcolaCostoTurno(t,dip);
    if(!r) return;
    totOrdDiurne+=r.oreOrdDiurne;
    totStrDiurni+=r.oreStrDiurni;
    totStrNott+=r.oreStrNott;
    totOrdNott+=r.oreOrdNott;
    costoOrdDiurno+=r.costoOrdDiurno;
    costoStrDiurno+=r.costoStrDiurno;
    costoStrNott+=r.costoStrNott;
    costoOrdNott+=r.costoOrdNott;
    if(r.tipo==="domenica"){ costoMaggDom+=r.costoMaggiorazione; giorniDomenica++; }
    if(r.tipo==="festivo"){ costoMaggFest+=r.costoMaggiorazione; giorniFestivi++; }
    totale+=r.totale;
  });

  return {
    dip, totOrdDiurne, totStrDiurni, totStrNott, totOrdNott,
    costoOrdDiurno, costoStrDiurno, costoStrNott, costoOrdNott,
    costoMaggDom, costoMaggFest, totale,
    giorniFestivi, giorniDomenica
  };
}

async function caricaDipendenti() {
  const snap=await getDocs(collection(db,"dipendenti"));
  state.dipendenti=snap.docs.map(d=>({id:d.id,...d.data()}));
  if(state.dipendenti.length===0) {
    const defaults=[
      {nome:"Mario Rossi",tipo:"Full Time",tariffaOraria:9.5,sogliaOre:6.67,monteFerie:160,montePermessi:24},
      {nome:"Giulia Bianchi",tipo:"Part Time",tariffaOraria:9.0,sogliaOre:6.67,monteFerie:80,montePermessi:12},
      {nome:"Luca Verdi",tipo:"Intermittente",tariffaOraria:10.0,sogliaOre:6.67,monteFerie:0,montePermessi:0},
    ];
    for(const d of defaults){
      const ref=await addDoc(collection(db,"dipendenti"),d);
      state.dipendenti.push({id:ref.id,...d});
    }
  }
}

function ascoltaTimbrature() {
  onSnapshot(collection(db,"timbrature"),snap=>{
    state.timbrature=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(state.vista!=="loading") render();
  });
}

async function avvia() {
  try {
    await caricaDipendenti();
    ascoltaTimbrature();
    state.vista="login"; render();
  } catch(e) {
    document.getElementById("app").innerHTML=`<div class="loading"><div style="color:#dc2626">❌ Errore Firebase: ${e.message}</div></div>`;
  }
}

function render() {
  const app=document.getElementById("app"); if(!app) return;
  if(state.vista==="login") app.innerHTML=renderLogin();
  else if(state.vista==="dipendente") app.innerHTML=renderDipendente();
  else if(state.vista==="admin") app.innerHTML=renderAdmin();
  // Rimuovi modali esistenti
  document.querySelectorAll(".modal-bg").forEach(el=>el.remove());
  if(state.modaleDip) document.body.insertAdjacentHTML("beforeend",renderModaleDip());
  if(state.modaleTimbratura) document.body.insertAdjacentHTML("beforeend",renderModaleTimbratura());
}

// Un solo listener globale — chiamato UNA volta sola
document.addEventListener("click", async function(e) {
  const t = e.target.closest("[data-login-dip],[data-login-admin],[data-logout],[data-dip-tab],[data-admin-tab],[data-filtro-mese],[data-filtro-anno],[data-add-turno],[data-add-assenza-btn],[data-salva-timbratura-admin],[data-modifica-timb],[data-elimina-timb],[data-chiudi-modale-timb],[data-salva-modifica-timb],[data-apri-modale-nuovo],[data-modifica-dip],[data-elimina-dip],[data-chiudi-modale],[data-salva-modale],[data-export-csv]");
  if(!t) return;

  if(t.dataset.loginDip) {
    state.utenteCorrente=state.dipendenti.find(d=>d.id===t.dataset.loginDip);
    state.vista="dipendente"; render();
  }
  else if(t.dataset.loginAdmin!==undefined) {
    const pin=prompt("Inserisci il PIN admin:");
    if(pin===ADMIN_PIN){state.vista="admin";render();} else if(pin!==null) alert("PIN errato!");
  }
  else if(t.dataset.logout!==undefined) {
    state.vista="login"; state.utenteCorrente=null; state.dipTab="timbra"; render();
  }
  else if(t.dataset.dipTab) {
    state.dipTab=t.dataset.dipTab; render();
  }
  else if(t.dataset.adminTab) {
    state.adminTab=t.dataset.adminTab; render();
  }
  else if(t.dataset.addTurno!==undefined) {
    const dip=state.utenteCorrente;
    const dataTurno=document.getElementById("inp-data-turno")?.value||oggi();
    const entrata=document.getElementById("inp-entrata")?.value;
    const uscita=document.getElementById("inp-uscita")?.value;
    const pausaNum=parseInt(document.getElementById("inp-pausa")?.value)||0;
    if(!entrata||!uscita){alert("Inserisci entrata e uscita!");return;}
    const calcolo=calcolaTurno(entrata,uscita,pausaNum,sogliaMinutiDip(dip));
    await addDoc(collection(db,"timbrature"),{dipendenteId:dip.id,data:dataTurno,tipo:"lavoro",entrata,uscita,pausa:pausaNum,calcolo});
    alert("✅ Turno registrato!");
  }
 else if(t.hasAttribute("data-add-assenza-btn")){
    const dip=state.utenteCorrente;
    const tipoAssenza=document.getElementById("inp-tipo-assenza")?.value;
    const dates=getDateAssenza("dip");
    if(!dates.length)return;
    if(!confirm(`Confermi "${tipoAssenza}" per ${dates.length} giorno/i?\n${dates.join(", ")}`))return;
    for(const data of dates){
      await addDoc(collection(db,"timbrature"),{dipendenteId:dip.id,data,tipo:"assenza",assenza:tipoAssenza,sbloccata:false});
    }
    alert(`Registrati ${dates.length} giorno/i di assenza!`);
    window._dateSelezionate["dip"]=new Set();
  }
  else if(t.dataset.salvaTimbraturAdmin!==undefined||t.getAttribute("data-salva-timbratura-admin")!==null) {
    const dipId=document.getElementById("ai-dip")?.value;
    const data=document.getElementById("ai-data")?.value||oggi();
    const tipo=document.getElementById("ai-tipo")?.value;
    const dip=state.dipendenti.find(d=>d.id===dipId);
    if(tipo==="lavoro"){
      const entrata=document.getElementById("ai-entrata")?.value;
      const uscita=document.getElementById("ai-uscita")?.value;
      const pausaNum=parseInt(document.getElementById("ai-pausa")?.value)||0;
      if(!entrata||!uscita){alert("Inserisci entrata e uscita!");return;}
      const calcolo=calcolaTurno(entrata,uscita,pausaNum,sogliaMinutiDip(dip));
      await addDoc(collection(db,"timbrature"),{dipendenteId:dipId,data,tipo:"lavoro",entrata,uscita,pausa:pausaNum,calcolo});
     }else{
      const assenza=document.getElementById("ai-assenza")?.value;
      const dates=getDateAssenza("admin");
      if(!dates.length)return;
      for(const dataAss of dates){
        await addDoc(collection(db,"timbrature"),{dipendenteId:dipId,data:dataAss,tipo:"assenza",assenza,sbloccata:false});
      }
      alert(`Inseriti ${dates.length} giorno/i di assenza!`);
      window._dateSelezionate["admin"]=new Set();
      const el=document.getElementById("lista-timbrature");
      if(el)el.innerHTML=renderListaTimbratureHTML(document.getElementById("filtro-dip-lista")?.value||"");
      return;
    }
   alert("Timbratura inserita!");
    window.renderListaTimbrature();
  }
  else if(t.dataset.modificaTimb) {
    const timb=state.timbrature.find(x=>x.id===t.dataset.modificaTimb);
    if(timb){state.modaleTimbratura=timb; render();}
  }
  else if(t.dataset.eliminaTimb) {
    if(!confirm("Eliminare questa timbratura?")) return;
    await deleteDoc(doc(db,"timbrature",t.dataset.eliminaTimb));
  }
  else if(t.dataset.chiudiModaleTimb!==undefined) {
    state.modaleTimbratura=null; render();
  }
  else if(t.dataset.salvaModificaTimb!==undefined) {
    const timb=state.modaleTimbratura;
    const dip=state.dipendenti.find(d=>d.id===timb.dipendenteId);
    let dati={};
    if(timb.tipo==="lavoro"){
      const entrata=document.getElementById("mt-entrata")?.value;
      const uscita=document.getElementById("mt-uscita")?.value;
      const pausaNum=parseInt(document.getElementById("mt-pausa")?.value)||0;
      const calcolo=calcolaTurno(entrata,uscita,pausaNum,sogliaMinutiDip(dip));
      dati={entrata,uscita,pausa:pausaNum,calcolo};
    } else {
      dati={assenza:document.getElementById("mt-assenza")?.value};
    }
    await updateDoc(doc(db,"timbrature",timb.id),dati);
    state.modaleTimbratura=null; render();
  }
  else if(t.dataset.apriModaleNuovo!==undefined) {
    state.modaleDip={mode:"nuovo",dip:{}}; render();
  }
  else if(t.dataset.modificaDip) {
    const dip=state.dipendenti.find(d=>d.id===t.dataset.modificaDip);
    state.modaleDip={mode:"modifica",dip}; render();
  }
  else if(t.dataset.eliminaDip) {
    const dip=state.dipendenti.find(d=>d.id===t.dataset.eliminaDip);
    if(!confirm(`Eliminare ${dip?.nome}?`)) return;
    await deleteDoc(doc(db,"dipendenti",t.dataset.eliminaDip));
    state.dipendenti=state.dipendenti.filter(d=>d.id!==t.dataset.eliminaDip); render();
  }
  else if(t.dataset.chiudiModale!==undefined) {
    state.modaleDip=null; render();
  }
  else if(t.dataset.salvaModale!==undefined) {
    const nome=document.getElementById("md-nome")?.value?.trim();
    const tipo=document.getElementById("md-tipo")?.value;
    const tariffa=parseFloat(document.getElementById("md-tariffa")?.value)||null;
    const soglia=parseFloat(document.getElementById("md-soglia")?.value)||6.67;
    const monteFerie=parseFloat(document.getElementById("md-ferie")?.value)||0;
    const montePermessi=parseFloat(document.getElementById("md-permessi")?.value)||0;
    if(!nome){alert("Inserisci il nome!");return;}
    const dati={nome,tipo,tariffaOraria:tariffa,sogliaOre:soglia,monteFerie,montePermessi};
    if(state.modaleDip.mode==="modifica"){
      const id=state.modaleDip.dip.id;
      await updateDoc(doc(db,"dipendenti",id),dati);
      const idx=state.dipendenti.findIndex(d=>d.id===id);
      if(idx>=0) state.dipendenti[idx]={...state.dipendenti[idx],...dati};
    } else {
      const ref=await addDoc(collection(db,"dipendenti"),dati);
      state.dipendenti.push({id:ref.id,...dati});
    }
    state.modaleDip=null; render();
  }
  else if(t.dataset.exportCsv!==undefined) {
    esportaCSV();
  }
});

function getRiepilogo() {
  return state.dipendenti.map(dip=>{
    const turni=getTimbMese().filter(t=>t.dipendenteId===dip.id&&t.tipo==="lavoro");

    const tot=turni.reduce((s,t)=>s+(t.calcolo?.totaleMin||0),0);

    const assCnt={}; VOCI_ASSENZA.forEach(v=>{assCnt[v]=ass.filter(a=>a.assenza===v).length;});
    return {dip,tot,diur,nott,strD,strN,assCnt,nTurni:turni.length};
  });
}

function esportaCSV() {
  const tm=getTimbMese();
  const righe=[["Dipendente","Tipo","Data","Giorno","Entrata","Uscita","Pausa","Ore Tot.","Diurne","Notturne","Str.Diurni","Str.Nott.","Assenza","Costo Totale"]];
  tm.forEach(t=>{
    const dip=state.dipendenti.find(x=>x.id===t.dipendenteId);
    const tipo=getTipoGiorno(t.data);
    const costo=t.calcolo&&dip?calcolaCostoTurno(t,dip):null;
    righe.push([dip?.nome||"",dip?.tipo||"",t.data,tipo,t.entrata||"",t.uscita||"",t.pausa||"",
      t.calcolo?minToHHMM(t.calcolo.totaleMin):"",t.calcolo?minToHHMM(t.calcolo.diurneMin):"",
      t.calcolo?minToHHMM(t.calcolo.notturneMin):"",t.calcolo?minToHHMM(t.calcolo.strDiurniMin):"",
      t.calcolo?minToHHMM(t.calcolo.strNotturniMin):"",t.assenza||"",
      costo?costo.totale.toFixed(2):"" ]);
  });
  const csv=righe.map(r=>r.map(c=>`"${c}"`).join(",")).join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"}));
  a.download=`timbrature_${MESI[state.filtroMese]}_${state.filtroAnno}.csv`; a.click();
}

  });

  function renderCalendarioMultiplo(prefisso) {
  const oggi_d = new Date();
  const anno = oggi_d.getFullYear();
  const mese = oggi_d.getMonth();
  const primoGiorno = new Date(anno, mese, 1).getDay();
  const giorniMese = new Date(anno, mese+1, 0).getDate();
  const giorni = ["Lu","Ma","Me","Gi","Ve","Sa","Do"];
  let html = `<div style="font-size:13px;font-weight:700;color:#374151;margin-bottom:8px;text-align:center">${MESI[mese]} ${anno}</div>`;
  html += `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center">`;
  giorni.forEach(g => html += `<div style="font-size:11px;font-weight:700;color:#9ca3af;padding:3px">${g}</div>`);
  const offset = (primoGiorno + 6) % 7;
  for(let i=0;i<offset;i++) html += `<div></div>`;
  for(let g=1;g<=giorniMese;g++){
    const ds = `${anno}-${String(mese+1).padStart(2,"0")}-${String(g).padStart(2,"0")}`;
    html += `<div id="${prefisso}-giorno-${ds}" onclick="toggleGiorno('${prefisso}','${ds}')" style="cursor:pointer;padding:5px 2px;border-radius:6px;font-size:13px;border:1px solid #e5e7eb;background:white" data-data="${ds}">${g}</div>`;
  }
  html += `</div>`;
  html += `<div id="${prefisso}-date-selezionate" style="margin-top:8px;font-size:12px;color:#6b7280">Nessuna data selezionata</div>`;
  return html;
}

window._dateSelezionate = { dip: new Set(), admin: new Set() };

window.toggleGiorno = function(prefisso, data) {
  const set = window._dateSelezionate[prefisso];
  const el = document.getElementById(`${prefisso}-giorno-${data}`);
  if(!el) return;
  if(set.has(data)){
    set.delete(data);
    el.style.background = "white";
    el.style.color = "inherit";
    el.style.borderColor = "#e5e7eb";
  } else {
    set.add(data);
    el.style.background = "#f59e0b";
    el.style.color = "white";
    el.style.borderColor = "#f59e0b";
  }
  const info = document.getElementById(`${prefisso}-date-selezionate`);
  if(info) info.textContent = set.size > 0 ? `${set.size} date selezionate: ${[...set].sort().join(", ")}` : "Nessuna data selezionata";
};

window.toggleModoAssenza = function(prefisso) {
  const modo = document.getElementById(`${prefisso === "dip" ? "inp" : "ai"}-modo-assenza`)?.value;
  const s = document.getElementById(`${prefisso}-assenza-singola`);
  const i = document.getElementById(`${prefisso}-assenza-intervallo`);
  const m = document.getElementById(`${prefisso}-assenza-multipla`);
  if(s) s.style.display = modo==="singola" ? "grid" : "none";
  if(i) i.style.display = modo==="intervallo" ? "block" : "none";
  if(m) m.style.display = modo==="multipla" ? "block" : "none";
  if(modo==="multipla") window._dateSelezionate[prefisso] = new Set();
};

function dateIntervallo(da, a) {
  const dates = [];
  const cur = new Date(da);
  const fine = new Date(a);
  while(cur <= fine){ dates.push(cur.toISOString().split("T")[0]); cur.setDate(cur.getDate()+1); }
  return dates;
}

function getDateAssenza(prefisso) {
  const modoId = prefisso === "dip" ? "inp-modo-assenza" : "ai-modo-assenza";
  const modo = document.getElementById(modoId)?.value || "singola";
  if(modo === "singola"){
    const id = prefisso === "dip" ? "inp-data-assenza" : "ai-data-assenza";
    const v = document.getElementById(id)?.value;
    return v ? [v] : [];
  }
  if(modo === "intervallo"){
    const da = document.getElementById(`${prefisso === "dip" ? "inp" : "ai"}-data-ass-da`)?.value;
    const a  = document.getElementById(`${prefisso === "dip" ? "inp" : "ai"}-data-ass-a`)?.value;
    if(!da||!a||da>a){ alert("Intervallo date non valido!"); return []; }
    return dateIntervallo(da, a);
  }
  if(modo === "multipla"){
    const dates = [...window._dateSelezionate[prefisso]].sort();
    if(!dates.length){ alert("Seleziona almeno una data!"); return []; }
    return dates;
  }
  return [];
}
