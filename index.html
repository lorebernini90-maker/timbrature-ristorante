<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const ADMIN_PIN = "1234";
const VOCI_ASSENZA = ["Ferie","Permesso","Malattia","Riposo Compensativo","Giorno Libero"];
const MESI = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
const SEDI = ["Vivandaio", "Rione Certosa"];

const MAGGIORAZIONI = {
  strDiurno: 0.30,
  strNotturno: 0.60,
  ordinarioNotturno: 0.25,
  domenica: 0.10,
  festivo: 0.20,
};

function getPassqua(anno) {
  const a=anno%19, b=Math.floor(anno/100), c=anno%100;
  const d=Math.floor(b/4), e=b%4, f=Math.floor((b+8)/25);
  const g=Math.floor((b-f+1)/3), h=(19*a+b-d-g+15)%30;
  const i=Math.floor(c/4), k=c%4, l=(32+2*e+2*i-h-k)%7;
  const m=Math.floor((a+11*h+22*l)/451);
  const mese=Math.floor((h+l-7*m+114)/31);
  const giorno=((h+l-7*m+114)%31)+1;
  return new Date(anno, mese-1, giorno);
}

function isFestivo(dataStr) {
  const d = new Date(dataStr);
  const anno = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const gg = String(d.getDate()).padStart(2,"0");
  const mmgg = `${mm}-${gg}`;
  const fissi = ["01-01","01-06","04-25","05-01","06-02","06-24","08-15","11-01","12-08","12-25","12-26"];
  if(fissi.includes(mmgg)) return true;
  const pasqua = getPassqua(anno);
  const pasquetta = new Date(pasqua); pasquetta.setDate(pasqua.getDate()+1);
  if(d.toDateString()===pasqua.toDateString()) return true;
  if(d.toDateString()===pasquetta.toDateString()) return true;
  return false;
}

function isDomenica(dataStr) { return new Date(dataStr).getDay() === 0; }
function getTipoGiorno(dataStr) {
  if(isFestivo(dataStr)) return "festivo";
  if(isDomenica(dataStr)) return "domenica";
  return "normale";
}

const firebaseConfig = {
  apiKey: "AIzaSyBx2VqiSLGTjWBR7s0lf96cYro1pUfTv08",
  authDomain: "timbrature-ristorante.firebaseapp.com",
  projectId: "timbrature-ristorante",
  storageBucket: "timbrature-ristorante.firebasestorage.app",
  messagingSenderId: "860258208491",
  appId: "1:860258208491:web:acab2683716fb4161b4cae"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

let state = {
  vista: "loading", utenteCorrente: null,
  dipendenti: [], timbrature: [],
  dipTab: "timbra", adminTab: "oggi", adminSubTab: "dashboard",
  filtroMese: new Date().getMonth(), filtroAnno: new Date().getFullYear(),
  filtroSede: "",
  modaleDip: null, modaleTimbratura: null,
  schedaDipId: null,
};

function timeToMin(t) { if(!t) return 0; const [h,m]=t.split(":").map(Number); return h*60+m; }
function minToHHMM(min) { if(!min||min<=0) return "0:00"; return `${Math.floor(min/60)}:${String(min%60).padStart(2,"0")}`; }
function oggi() { return new Date().toISOString().split("T")[0]; }
function oraNow() { const n=new Date(); return `${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")}`; }
function euro(n) { return `€ ${(n||0).toFixed(2)}`; }

function calcolaTurno(entrata, uscita, pausa, sogliaMinuti) {
  if(!entrata||!uscita) return null;
  const e=timeToMin(entrata); let u=timeToMin(uscita);
  if(u<e) u+=1440;
  const pausaNum=parseInt(pausa)||0;
  const tot=u-e-pausaNum;
  const soglia=sogliaMinuti||400;
  const str=Math.max(0,tot-soglia);
  const N1=23*60,N2=6*60; let nott=0;
  if(u>N1) nott+=Math.min(u,1440)-Math.max(e,N1);
  if(u>1440) nott+=Math.min(u-1440,N2);
  nott=Math.max(0,nott);
  const diur=Math.max(0,tot-nott);
  const strN=Math.min(str,nott), strD=Math.max(0,str-strN);
  const ordNott=Math.max(0,nott-strN);
  return {totaleMin:tot,diurneMin:diur,notturneMin:nott,straordinariMin:str,strDiurniMin:strD,strNotturniMin:strN,ordNottMin:ordNott};
}

function sogliaMinutiDip(dip) {
  if(dip.sogliaOre) return Math.round(dip.sogliaOre*60);
  return 400;
}

// Dipendenti attivi (attivo !== false E fineContratto non ancora passata)
function getDipendentiAttivi() {
  const oggi_str = oggi();
  return state.dipendenti.filter(d => {
    if(d.attivo === false) return false;
    if(d.fineContratto && d.fineContratto < oggi_str) return false;
    return true;
  });
}

// Usa sogliaCustom del turno se impostata, altrimenti quella del dipendente
function sogliaPerTurno(timb, dip) {
  if(timb?.sogliaCustom && timb.sogliaCustom > 0) return timb.sogliaCustom;
  return sogliaMinutiDip(dip);
}

// ── AGGREGAZIONE TURNI SPEZZATI ────────────────────────────────
// Raggruppa più turni dello stesso giorno per un dipendente e ricalcola
// straordinari sul totale giornaliero (non per singolo turno)
function aggregaTurniGiorno(turniGiorno, dip) {
  if(!turniGiorno.length) return null;
  if(turniGiorno.length === 1) return { turni: turniGiorno, calcolo: turniGiorno[0].calcolo };

  // Somma ore per-turno senza ricalcolare straordinari
  let totaleMin = 0, diurneMin = 0, notturneMin = 0, ordNottMin = 0;
  turniGiorno.forEach(t => {
    if(!t.calcolo) return;
    totaleMin += t.calcolo.totaleMin || 0;
    diurneMin += t.calcolo.diurneMin || 0;
    notturneMin += t.calcolo.notturneMin || 0;
    ordNottMin += (t.calcolo.ordNottMin || 0);
  });

  // Usa soglia custom del primo turno del giorno (se presente), altrimenti quella del dipendente
  const primoTurno = turniGiorno[0];
  const soglia = sogliaPerTurno(primoTurno, dip);
  const straordinariMin = Math.max(0, totaleMin - soglia);
  const strNotturniMin = Math.min(straordinariMin, notturneMin);
  const strDiurniMin = Math.max(0, straordinariMin - strNotturniMin);
  const ordNottMinCalc = Math.max(0, notturneMin - strNotturniMin);

  return {
    turni: turniGiorno,
    calcolo: { totaleMin, diurneMin, notturneMin, straordinariMin, strDiurniMin, strNotturniMin, ordNottMin: ordNottMinCalc }
  };
}

function calcolaCostoTurno(timb, dip) {
  if(!timb.calcolo||!dip.tariffaOraria) return null;
  const tariffa=dip.tariffaOraria;
  const c=timb.calcolo;
  const tipo=getTipoGiorno(timb.data);

  const oreOrdDiurne=(c.diurneMin-c.strDiurniMin)/60;
  const oreStrDiurni=c.strDiurniMin/60;
  const oreStrNott=c.strNotturniMin/60;
  const oreOrdNott=(c.ordNottMin||0)/60;

  const costoOrdDiurno=oreOrdDiurne*tariffa;
  const costoStrDiurno=oreStrDiurni*tariffa*(1+MAGGIORAZIONI.strDiurno);
  const costoStrNott=oreStrNott*tariffa*(1+MAGGIORAZIONI.strNotturno);
  const costoOrdNott=oreOrdNott*tariffa*(1+MAGGIORAZIONI.ordinarioNotturno);

  let costoMaggiorazione=0;
  if(tipo==="domenica") costoMaggiorazione=oreOrdDiurne*tariffa*MAGGIORAZIONI.domenica;
  if(tipo==="festivo") costoMaggiorazione=(oreOrdDiurne+oreOrdNott)*tariffa*MAGGIORAZIONI.festivo;

  const totale=costoOrdDiurno+costoStrDiurno+costoStrNott+costoOrdNott+costoMaggiorazione;

  return {
    oreOrdDiurne, oreStrDiurni, oreStrNott, oreOrdNott,
    costoOrdDiurno, costoStrDiurno, costoStrNott, costoOrdNott,
    costoMaggiorazione, totale, tipo, tariffa
  };
}

// Versione che accetta un calcolo aggregato (per spezzati)
function calcolaCostoAggregato(calcolo, data, dip) {
  if(!calcolo||!dip.tariffaOraria) return null;
  const fakeTimb = { calcolo, data };
  return calcolaCostoTurno(fakeTimb, dip);
}

// Raggruppa date consecutive in episodi (gap <= 3 giorni incluse domeniche/festivi)
function raggruppaEpisodiMalattia(date) {
  if(!date.length) return [];
  const sorted = [...date].sort();
  const episodi = [];
  let episodio = [sorted[0]];
  for(let i=1; i<sorted.length; i++) {
    const prev = new Date(sorted[i-1]);
    const cur  = new Date(sorted[i]);
    const diffGiorni = Math.round((cur - prev) / 86400000);
    // Considera stesso episodio se distanza <= 3 (weekend/festivi in mezzo)
    if(diffGiorni <= 3) {
      episodio.push(sorted[i]);
    } else {
      episodi.push(episodio);
      episodio = [sorted[i]];
    }
  }
  episodi.push(episodio);
  return episodi;
}

// Calcola costo malattia CCNL Turismo con integrazione INPS
// Giorno 1-3 (carenza): 100% a carico azienda
// Giorno 4-20: 50% a carico azienda (INPS copre 50%)
// Giorno 21+: 33.33% a carico azienda (INPS copre 66.67%)
function calcolaCostoMalattiaEpisodio(numGiorni, costoGiorno) {
  let costo = 0;
  for(let g=1; g<=numGiorni; g++) {
    if(g <= 3)       costo += costoGiorno * 1.00;   // carenza: 100%
    else if(g <= 20) costo += costoGiorno * 0.50;   // INPS 50%
    else             costo += costoGiorno * 0.3333; // INPS 66.67%
  }
  return costo;
}

function calcolaCostoAssenzeMensili(dipId) {
  const dip = state.dipendenti.find(d => d.id === dipId);
  if(!dip?.tariffaOraria) return null;
  const oreDip = sogliaMinutiDip(dip) / 60;
  const costoGiorno = oreDip * dip.tariffaOraria;

  // Tutte le assenze del dipendente (non solo del mese) per calcolare episodi completi
  const tutteAssenze = state.timbrature.filter(t =>
    t.dipendenteId === dipId && t.tipo === "assenza" && t.assenza === "Malattia"
  );
  const assenzeMese = getTimbMese().filter(t =>
    t.dipendenteId === dipId && t.tipo === "assenza"
  );
  const assenzeValide = assenzeMese.filter(a =>
    new Date(a.data).getDay() !== 0 && a.assenza !== "Giorno Libero"
  );

  // Calcolo malattia con episodi (usa tutte le date per contesto, poi filtra costo al mese)
  const dateMalattiaTutte = tutteAssenze
    .filter(a => new Date(a.data).getDay() !== 0)
    .map(a => a.data);
  const episodi = raggruppaEpisodiMalattia(dateMalattiaTutte);

  // Costruisce mappa data→{episodioIndex, giornoProgressivo}
  const mapaGiornoProgressivo = {};
  episodi.forEach((ep, idx) => {
    ep.forEach((data, i) => {
      mapaGiornoProgressivo[data] = { episodio: idx, giornoProgressivo: i+1, totEpisodio: ep.length };
    });
  });

  // Calcola costo malattia solo per i giorni del mese corrente
  const dateMailattiaMese = assenzeValide
    .filter(a => a.assenza === "Malattia")
    .map(a => a.data)
    .filter(d => new Date(d).getDay() !== 0);

  let costoMalattia = 0;
  let dettaglioMalattia = { carenza: 0, parziale: 0, ridotto: 0 }; // giorni per fascia
  dateMailattiaMese.forEach(data => {
    const info = mapaGiornoProgressivo[data];
    if(!info) { costoMalattia += costoGiorno; return; }
    const g = info.giornoProgressivo;
    if(g <= 3)       { costoMalattia += costoGiorno * 1.00;   dettaglioMalattia.carenza++; }
    else if(g <= 20) { costoMalattia += costoGiorno * 0.50;   dettaglioMalattia.parziale++; }
    else             { costoMalattia += costoGiorno * 0.3333; dettaglioMalattia.ridotto++; }
  });

  // Calcolo altre assenze (costo pieno)
  const dettaglio = {};
  VOCI_ASSENZA.forEach(v => {
    if(v === "Malattia" || v === "Giorno Libero") return;
    const giorni = assenzeValide.filter(a => a.assenza === v).length;
    dettaglio[v] = { giorni, ore: giorni * oreDip, costo: giorni * costoGiorno };
  });
  const giorniMalattia = dateMailattiaMese.length;
  dettaglio["Malattia"] = {
    giorni: giorniMalattia,
    ore: giorniMalattia * oreDip,
    costo: costoMalattia,
    dettaglioINPS: dettaglioMalattia
  };

  const altreAssenzeCosto = Object.entries(dettaglio)
    .filter(([v]) => v !== "Malattia")
    .reduce((s, [,v]) => s + v.costo, 0);
  const totaleGiorni = assenzeValide.length;
  const totaleOre = totaleGiorni * oreDip;
  const totaleCosto = altreAssenzeCosto + costoMalattia;

  return { dettaglio, totaleGiorni, totaleOre, totaleCosto, oreDip,
           tariffa: dip.tariffaOraria, costoMalattia, dettaglioMalattia };
}

function calcolaCostoMensile(dipId) {
  const dip = state.dipendenti.find(d => d.id === dipId);
  if(!dip?.tariffaOraria) return null;
  const turniMese = getTimbMese().filter(t => t.dipendenteId === dipId && t.tipo === "lavoro");

  // Raggruppa per giorno e calcola costo su aggregato
  const perGiorno = {};
  turniMese.forEach(t => {
    if(!perGiorno[t.data]) perGiorno[t.data] = [];
    perGiorno[t.data].push(t);
  });

  let totOrdDiurne=0, totStrDiurni=0, totStrNott=0, totOrdNott=0;
  let costoOrdDiurno=0, costoStrDiurno=0, costoStrNott=0, costoOrdNott=0;
  let costoMaggDom=0, costoMaggFest=0, totale=0;
  let giorniFestivi=0, giorniDomenica=0;

  Object.entries(perGiorno).forEach(([data, turni]) => {
    const agg = aggregaTurniGiorno(turni, dip);
    if(!agg) return;
    const r = calcolaCostoAggregato(agg.calcolo, data, dip);
    if(!r) return;
    totOrdDiurne+=r.oreOrdDiurne;
    totStrDiurni+=r.oreStrDiurni;
    totStrNott+=r.oreStrNott;
    totOrdNott+=r.oreOrdNott;
    costoOrdDiurno+=r.costoOrdDiurno;
    costoStrDiurno+=r.costoStrDiurno;
    costoStrNott+=r.costoStrNott;
    costoOrdNott+=r.costoOrdNott;
    if(r.tipo==="domenica"){ costoMaggDom+=r.costoMaggiorazione; giorniDomenica++; }
    if(r.tipo==="festivo"){ costoMaggFest+=r.costoMaggiorazione; giorniFestivi++; }
    totale+=r.totale;
  });

  return {
    dip, totOrdDiurne, totStrDiurni, totStrNott, totOrdNott,
    costoOrdDiurno, costoStrDiurno, costoStrNott, costoOrdNott,
    costoMaggDom, costoMaggFest, totale,
    giorniFestivi, giorniDomenica
  };
}

async function caricaDipendenti() {
  const snap=await getDocs(collection(db,"dipendenti"));
  state.dipendenti=snap.docs.map(d=>({id:d.id,...d.data()}));
  if(state.dipendenti.length===0) {
    const defaults=[
      {nome:"Mario Rossi",tipo:"Full Time",tariffaOraria:9.5,sogliaOre:6.67,monteFerie:160,montePermessi:24},
      {nome:"Giulia Bianchi",tipo:"Part Time",tariffaOraria:9.0,sogliaOre:6.67,monteFerie:80,montePermessi:12},
      {nome:"Luca Verdi",tipo:"Intermittente",tariffaOraria:10.0,sogliaOre:6.67,monteFerie:0,montePermessi:0},
    ];
    for(const d of defaults){
      const ref=await addDoc(collection(db,"dipendenti"),d);
      state.dipendenti.push({id:ref.id,...d});
    }
  }
}

function ascoltaTimbrature() {
  onSnapshot(collection(db,"timbrature"),snap=>{
    state.timbrature=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(state.vista!=="loading") render();
  });
}

async function avvia() {
  try {
    await caricaDipendenti();
    ascoltaTimbrature();
    state.vista="login"; render();
  } catch(e) {
    document.getElementById("app").innerHTML=`<div class="loading"><div style="color:#dc2626">❌ Errore Firebase: ${e.message}</div></div>`;
  }
}

function render() {
  if(state._saving) return;
  const app=document.getElementById("app"); if(!app) return;
  if(state.vista==="login") app.innerHTML=renderLogin();
  else if(state.vista==="dipendente") app.innerHTML=renderDipendente();
  else if(state.vista==="admin") app.innerHTML=renderAdmin();
  document.querySelectorAll(".modal-bg").forEach(el=>el.remove());
  if(state.modaleDip) document.body.insertAdjacentHTML("beforeend",renderModaleDip());
  if(state.modaleTimbratura) document.body.insertAdjacentHTML("beforeend",renderModaleTimbratura());
}

// ── STORICO DIPENDENTE: raggruppa turni spezzati per data ──────
function renderDipStorico(dip) {
  // Filtri: data singola o mese
  const filtroData = document.getElementById("dip-filtro-data")?.value || "";
  const filtroMese = document.getElementById("dip-filtro-mese")?.value || "";

  const storico=[...state.timbrature].filter(t => {
    if(t.dipendenteId !== dip.id) return false;
    if(filtroData) return t.data === filtroData;
    if(filtroMese) return t.data.startsWith(filtroMese);
    return true;
  }).sort((a,b)=>b.data.localeCompare(a.data));

  // Raggruppa per data
  const perData = {};
  storico.forEach(t => {
    if(!perData[t.data]) perData[t.data] = [];
    perData[t.data].push(t);
  });

  const datasOrd = Object.keys(perData).sort((a,b)=>b.localeCompare(a));
  const righe = datasOrd.map(data => {
    const items = perData[data];
    const turni = items.filter(t=>t.tipo==="lavoro");
    const assenze = items.filter(t=>t.tipo==="assenza");

    if(turni.length === 0 && assenze.length > 0) {
      return assenze.map(t=>`
        <div class="row">
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <span style="font-weight:600">${t.data}</span>
            <span class="badge badge-blue">${t.assenza}</span>
          </div>
        </div>`).join("");
    }

    if(turni.length === 1) {
      const t = turni[0];
      const aperto = t.aperto===true||(!t.uscita&&t.entrata);
      return `<div class="row" style="${aperto?"background:#fef9f0;border-color:#fde68a":""}">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <span style="font-weight:600">${t.data}</span>
          ${aperto
            ?`<span style="color:#d97706">⚠️ ${t.entrata} → in corso</span>`
            :`<span style="color:#6b7280">${t.entrata} → ${t.uscita} <span style="color:#9ca3af">(${t.pausa}min pausa)</span></span>`
          }
        </div>
        ${t.calcolo?`<span style="font-weight:700">${minToHHMM(t.calcolo.totaleMin)}h</span>`:aperto?`<span style="color:#d97706;font-size:12px">in corso</span>`:""}
      </div>`;
    }

    // Turni spezzati
    const agg = aggregaTurniGiorno(turni, dip);
    return `<div style="border:1px solid #fed7aa;border-radius:8px;padding:10px;margin-bottom:6px;background:#fff7ed">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div style="display:flex;gap:6px;align-items:center">
          <span style="font-weight:700">${data}</span>
          <span class="badge badge-orange">✂️ Spezzato</span>
        </div>
        <span style="font-weight:700;color:#c2410c">${minToHHMM(agg.calcolo.totaleMin)}h tot.</span>
      </div>
      ${turni.map((t,i)=>`<div style="display:flex;gap:8px;align-items:center;font-size:12px;color:#6b7280;margin-left:8px;margin-bottom:3px">
        <span style="color:#92400e;font-weight:600">Turno ${i+1}:</span>
        <span>${t.entrata} → ${t.uscita} (${t.pausa}min pausa)</span>
        <span style="color:#9ca3af">${minToHHMM(t.calcolo?.totaleMin||0)}h</span>
      </div>`).join("")}
    </div>`;
  }).join("");

  const oggi = new Date().toISOString().split("T")[0];
  const meseCorrente = oggi.slice(0,7);

  return `
    <div style="background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:12px;margin-bottom:12px">
      <div style="font-size:12px;font-weight:600;color:#374151;margin-bottom:8px">🔍 Cerca turno</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">
        <div style="flex:1;min-width:130px">
          <label style="font-size:11px;color:#6b7280;display:block;margin-bottom:3px">Giorno specifico</label>
          <input type="date" id="dip-filtro-data" value="${filtroData}" max="${oggi}"
            style="width:100%;padding:7px 10px;border:1px solid #d1d5db;border-radius:8px;font-size:13px"
            onchange="document.getElementById('dip-filtro-mese').value=''; render()">
        </div>
        <div style="flex:1;min-width:130px">
          <label style="font-size:11px;color:#6b7280;display:block;margin-bottom:3px">Mese</label>
          <input type="month" id="dip-filtro-mese" value="${filtroMese || meseCorrente}"
            style="width:100%;padding:7px 10px;border:1px solid #d1d5db;border-radius:8px;font-size:13px"
            onchange="document.getElementById('dip-filtro-data').value=''; render()">
        </div>
        <button onclick="document.getElementById('dip-filtro-data').value=''; document.getElementById('dip-filtro-mese').value=''; render()"
          style="padding:7px 14px;background:#f3f4f6;border:1px solid #d1d5db;border-radius:8px;font-size:12px;cursor:pointer;white-space:nowrap">
          🗑 Tutto
        </button>
      </div>
    </div>
    ${!datasOrd.length
      ? `<div class="empty">Nessuna registrazione trovata${filtroData?" per "+filtroData:filtroMese?" per "+filtroMese:""}.</div>`
      : righe}`;
}

  else if(sub==="inserisci") content=renderAdminInserisci();

  else if(sub==="settimane") content=renderAdminSettimane();
  else if(sub==="scheda") content=renderAdminScheda();
  else if(sub==="costi") content=renderAdminCosti();

        </select>
        <button class="btn btn-sm btn-primary" data-export-csv>⬇️ CSV</button>
        <button class="btn btn-sm btn-primary" data-export-excel>⬇️ Excel</button>
        <button class="btn btn-white btn-sm" data-logout>Esci</button>
      </div>
    </div>
    <div style="max-width:960px;margin:0 auto;padding:16px">

      <!-- MACRO TAB (livello 1) -->
      <div class="macro-tabs" style="display:flex;gap:4px;margin-bottom:0;flex-wrap:wrap">
        ${macros.map(m=>{
          const isActive = m.key===macroCorrente;
          return `<button data-admin-macro="${m.key}" style="padding:9px 18px;font-size:13px;font-weight:700;border:none;border-radius:10px 10px 0 0;cursor:pointer;transition:all 0.15s;
            background:${isActive?"#1e293b":"#f1f5f9"};color:${isActive?"white":"#475569"};

      <!-- CONTENITORE principale -->
      <div style="background:white;border:1px solid #e5e7eb;border-radius:0 12px 12px 12px;box-shadow:0 2px 8px rgba(0,0,0,0.05)">

        <!-- SUB-TAB (livello 2) -->
        <div class="sub-tabs" style="display:flex;gap:2px;padding:10px 14px 0;border-bottom:1px solid #f1f5f9;flex-wrap:wrap">

// ── DASHBOARD OGGI ────────────────────────────────────────────
function renderAdminDashboard() {
  const dataOggi = oggi();
  const timbratureOggi = state.timbrature.filter(t => t.data === dataOggi);
  const dipAttivi = getDipendentiAttivi().filter(d => d.tipo !== "Intermittente");

  // Presenti: almeno un turno lavoro oggi con entrata
  const presenti = dipAttivi.filter(d => timbratureOggi.some(t => t.dipendenteId===d.id && t.tipo==="lavoro"));
  // Assenti giustificati
  const assentiGiust = dipAttivi.filter(d => !presenti.find(p=>p.id===d.id) && timbratureOggi.some(t=>t.dipendenteId===d.id&&t.tipo==="assenza"));
  // Non ancora timbrati
  const nonTimbrati = dipAttivi.filter(d => !timbratureOggi.some(t=>t.dipendenteId===d.id));
  // Anomalie: turni con entrata ma senza uscita (ancora in servizio o dimenticati)
  const inServizio = presenti.filter(d => {
    const turni = timbratureOggi.filter(t=>t.dipendenteId===d.id&&t.tipo==="lavoro");
    return turni.some(t=>t.entrata&&!t.uscita);
  });
  // Ore totali già registrate oggi
  let oreTotOggi = 0;
  timbratureOggi.filter(t=>t.tipo==="lavoro"&&t.calcolo).forEach(t=>oreTotOggi+=t.calcolo.totaleMin||0);

  return `
    <div style="margin-bottom:20px">
      <div style="font-size:15px;font-weight:700;color:#374151;margin-bottom:4px">🏠 Dashboard — ${dataOggi}</div>
      <div style="font-size:12px;color:#9ca3af">Panoramica della giornata in corso</div>
    </div>

    <!-- KPI CARDS -->
    <div class="kpi-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:24px">
      <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:14px;text-align:center">
        <div style="font-size:28px;font-weight:700;color:#059669">${presenti.length}</div>
        <div style="font-size:12px;color:#6b7280;margin-top:2px">✅ Presenti</div>
      </div>
      <div style="background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:14px;text-align:center">
        <div style="font-size:28px;font-weight:700;color:#dc2626">${nonTimbrati.length}</div>
        <div style="font-size:12px;color:#6b7280;margin-top:2px">⏳ Non timbrati</div>
      </div>
      <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;padding:14px;text-align:center">
        <div style="font-size:28px;font-weight:700;color:#2563eb">${assentiGiust.length}</div>
        <div style="font-size:12px;color:#6b7280;margin-top:2px">🏖️ Assenti giust.</div>
      </div>
      <div style="background:#fefce8;border:1px solid #fde68a;border-radius:12px;padding:14px;text-align:center">
        <div style="font-size:28px;font-weight:700;color:#d97706">${minToHHMM(oreTotOggi)}h</div>
        <div style="font-size:12px;color:#6b7280;margin-top:2px">⏱ Ore registrate</div>
      </div>
    </div>

    <!-- IN SERVIZIO ADESSO -->
    ${inServizio.length > 0 ? `
    <div style="margin-bottom:20px">
      <div style="font-size:12px;font-weight:700;color:#059669;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">🟢 In servizio adesso (${inServizio.length})</div>
      ${inServizio.map(d => {
        const t = timbratureOggi.filter(x=>x.dipendenteId===d.id&&x.tipo==="lavoro").find(x=>!x.uscita);
        return `<div class="row">
          <div style="display:flex;gap:8px;align-items:center">
            <span style="color:#10b981;font-size:16px">🟢</span>
            <span style="font-weight:600">${d.nome}</span>
            <span style="color:#6b7280;font-size:12px">Entrata: ${t?.entrata||"—"}</span>
          </div>
          <span style="font-size:11px;color:#9ca3af">${d.tipo}</span>
        </div>`;
      }).join("")}
    </div>` : ""}

    <!-- PRESENTI OGGI (con uscita) -->
    ${presenti.filter(d=>!inServizio.find(x=>x.id===d.id)).length > 0 ? `

function getTimbMese() {
  return state.timbrature.filter(t=>{
    const d=new Date(t.data);
    const okMese=d.getMonth()===state.filtroMese&&d.getFullYear()===state.filtroAnno;
    const okSede=!state.filtroSede||t.sede===state.filtroSede;
    return okMese&&okSede;
  });
}

// ── RIEPILOGO: aggrega turni spezzati per giorno ───────────────
function getRiepilogo() {
  return state.dipendenti.map(dip=>{
    const turni=getTimbMese().filter(t=>t.dipendenteId===dip.id&&t.tipo==="lavoro"&&t.uscita);
    const ass=getTimbMese().filter(t=>t.dipendenteId===dip.id&&t.tipo==="assenza");

    // Raggruppa turni per giorno
    const perGiorno = {};
    turni.forEach(t => { if(!perGiorno[t.data]) perGiorno[t.data]=[]; perGiorno[t.data].push(t); });

    let tot=0, diur=0, nott=0, strD=0, strN=0;
    let nTurni = Object.keys(perGiorno).length; // giorni lavorati, non sotto-turni

    Object.entries(perGiorno).forEach(([data, ts]) => {
      const agg = aggregaTurniGiorno(ts, dip);
      if(!agg) return;
      tot += agg.calcolo.totaleMin;
      diur += agg.calcolo.diurneMin;
      nott += agg.calcolo.notturneMin;
      strD += agg.calcolo.strDiurniMin;
      strN += agg.calcolo.strNotturniMin;
    });

    const assCnt={}; VOCI_ASSENZA.forEach(v=>{assCnt[v]=ass.filter(a=>a.assenza===v&&new Date(a.data).getDay()!==0).length;});
    return {dip,tot,diur,nott,strD,strN,assCnt,nTurni};
  });
}

// Stato locale calendario rapido
window._irGiorni = {}; // { "2026-03-01": {sel:true, entrata:"09:00", uscita:"17:00", pausa:30} }

function getDayOfWeek(anno, mese, giorno) {
  // Algoritmo di Zeller — non usa Date per evitare problemi di fuso orario
  let m = mese, y = anno;
  if(m < 3) { m += 12; y -= 1; }
  const k = y % 100, j = Math.floor(y / 100);
  const h = (giorno + Math.floor(13*(m+1)/5) + k + Math.floor(k/4) + Math.floor(j/4) - 2*j) % 7;
  // h: 0=Sab,1=Dom,2=Lun,...6=Ven → converti a 0=Dom,1=Lun,...6=Sab
  return (h + 6) % 7;
}

  const enDef = document.getElementById("ir-entrata-default")?.value||"09:00";
  const usDef = document.getElementById("ir-uscita-default")?.value||"17:00";
  const paDef = parseInt(document.getElementById("ir-pausa-default")?.value)||30;

  let html = '<div style="display:flex;flex-direction:column;gap:6px">';
  for(let g=1; g<=giorniMese; g++) {
    const dataStr = `${anno}-${String(m).padStart(2,"0")}-${String(g).padStart(2,"0")}`;
    const dow = getDayOfWeek(anno, m, g);
    const fest = isFestivo(dataStr);
    const dom = dow===0;
    const stato = window._irGiorni[dataStr] || {sel:false, entrata:enDef, uscita:usDef, pausa:paDef};
    const sel = stato.sel;
    const bg = sel ? "#f0fdf4" : "#f9fafb";
    const border = sel ? "1px solid #86efac" : "1px solid #e5e7eb";
    const label = dom ? `<span style="color:#7c3aed;font-weight:700">${gg[dow]}</span>` :
                  fest ? `<span style="color:#dc2626;font-weight:700">${gg[dow]} 🎉</span>` :
                  `<span style="color:#374151;font-weight:600">${gg[dow]}</span>`;
    html += `<div style="background:${bg};border:${border};border-radius:8px;padding:8px 10px">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <input type="checkbox" ${sel?"checked":""} onchange="toggleGiornoRapido('${dataStr}',this.checked)"
          style="width:18px;height:18px;cursor:pointer;accent-color:#059669;flex-shrink:0">
        <span style="min-width:30px;font-size:13px">${String(g).padStart(2,"0")}</span>
        ${label}
        ${fest?`<span style="font-size:11px;background:#fee2e2;color:#dc2626;padding:1px 6px;border-radius:6px">Festivo</span>`:""}
        ${sel?`
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-left:auto">
          <input type="time" value="${stato.entrata}" onchange="aggiornaGiornoRapido('${dataStr}','entrata',this.value)"
            style="width:90px;padding:4px 6px;font-size:12px;border:1px solid #d1d5db;border-radius:6px">
          <span style="color:#9ca3af;font-size:12px">→</span>
          <input type="time" value="${stato.uscita}" onchange="aggiornaGiornoRapido('${dataStr}','uscita',this.value)"
            style="width:90px;padding:4px 6px;font-size:12px;border:1px solid #d1d5db;border-radius:6px">
          <input type="number" value="${stato.pausa}" min="0" max="120" onchange="aggiornaGiornoRapido('${dataStr}','pausa',parseInt(this.value)||0)"
            style="width:60px;padding:4px 6px;font-size:12px;border:1px solid #d1d5db;border-radius:6px" placeholder="pausa">
          <span style="font-size:11px;color:#9ca3af">min</span>
        </div>`:""}
      </div>
    </div>`;
  }
  html += "</div>";
  return html;
}

function toggleGiornoRapido(data, checked) {
  const enDef = document.getElementById("ir-entrata-default")?.value||"09:00";
  const usDef = document.getElementById("ir-uscita-default")?.value||"17:00";
  const paDef = parseInt(document.getElementById("ir-pausa-default")?.value)||30;
  if(!window._irGiorni[data]) window._irGiorni[data]={sel:false,entrata:enDef,uscita:usDef,pausa:paDef};
  window._irGiorni[data].sel = checked;
  const el = document.getElementById("calendario-rapido");
  if(el) el.innerHTML = renderCalendarioRapidoHTML();
}

function aggiornaGiornoRapido(data, campo, valore) {
  if(!window._irGiorni[data]) return;
  window._irGiorni[data][campo] = valore;
}

function aggiornaDefaultOrari() {
  const enDef = document.getElementById("ir-entrata-default")?.value||"09:00";
  const usDef = document.getElementById("ir-uscita-default")?.value||"17:00";
  const paDef = parseInt(document.getElementById("ir-pausa-default")?.value)||30;

  Object.keys(window._irGiorni).forEach(data => {
    if(!window._irGiorni[data]._modificato) {
      window._irGiorni[data].entrata = enDef;
      window._irGiorni[data].uscita = usDef;

function renderListaTimbratureHTML(filtroDipId) {
  let lista=[...state.timbrature].sort((a,b)=>b.data.localeCompare(a.data)||a.entrata?.localeCompare(b.entrata||"")||0);
  if(filtroDipId) lista=lista.filter(t=>t.dipendenteId===filtroDipId);
  lista=lista.slice(0,50);
  if(!lista.length) return `<div class="empty">Nessuna timbratura.</div>`;
  const righe = lista.map(t=>{
    const dip=state.dipendenti.find(d=>d.id===t.dipendenteId);
    const tipo=getTipoGiorno(t.data);
    const fratelli=state.timbrature.filter(x=>x.dipendenteId===t.dipendenteId&&x.data===t.data&&x.tipo==="lavoro");
    const isSpezzato = fratelli.length > 1;
    return `<div class="row" style="cursor:default">
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <input type="checkbox" class="timb-check" data-id="${t.id}"
          style="width:16px;height:16px;cursor:pointer;accent-color:#ef4444;flex-shrink:0"
          onchange="aggiornaBarraEliminazione()">
        <span style="font-weight:600;color:#374151">${dip?.nome||"?"}</span>
        <span style="color:#9ca3af">${t.data}</span>
        ${tipo==="festivo"?`<span class="badge badge-red">🎉 Festivo</span>`:tipo==="domenica"?`<span class="badge badge-purple">☀️ Dom.</span>`:""}
        ${isSpezzato?`<span class="badge badge-orange">✂️ Spezzato</span>`:""}
        ${t.sede?`<span class="badge" style="background:#e0f2fe;color:#0369a1">${t.sede}</span>`:""}
        ${t.tipo==="lavoro"?`<span style="color:#6b7280">${t.entrata}→${t.uscita} (${t.pausa}min)</span>`:`<span class="badge badge-blue">${t.assenza}</span>`}
        ${t.sogliaCustom?`<span class="badge" style="background:#ede9fe;color:#5b21b6">⏱ soglia ${(t.sogliaCustom/60).toFixed(2)}h</span>`:""}
        ${t.calcolo?.straordinariMin>0?`<span class="badge badge-red">+${minToHHMM(t.calcolo.straordinariMin)}h STR</span>`:""}
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        ${t.calcolo?`<span style="font-weight:700;font-size:13px">${minToHHMM(t.calcolo.totaleMin)}h</span>`:""}
        <button class="btn btn-sm" style="background:#f3f4f6;color:#374151" data-modifica-timb="${t.id}">✏️</button>
        <button class="btn btn-sm btn-danger" data-elimina-timb="${t.id}">🗑️</button>
      </div>
    </div>`;}).join("");
  return `
    <div id="barra-eliminazione" style="display:none;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;margin-bottom:10px;display:none;align-items:center;justify-content:space-between;gap:8px">
      <span id="contatore-selezionati" style="font-size:13px;font-weight:600;color:#dc2626">0 selezionate</span>
      <div style="display:flex;gap:6px">
        <button onclick="selezionaTutteTimbrature(true)" style="padding:5px 10px;font-size:12px;background:#f3f4f6;border:1px solid #e5e7eb;border-radius:6px;cursor:pointer">Seleziona tutte</button>
        <button onclick="selezionaTutteTimbrature(false)" style="padding:5px 10px;font-size:12px;background:#f3f4f6;border:1px solid #e5e7eb;border-radius:6px;cursor:pointer">Deseleziona</button>
        <button class="btn btn-sm btn-danger" data-elimina-selezionati>🗑️ Elimina selezionate</button>
      </div>
    </div>
    ${righe}`;
}

function renderAdminSettimane() {
  const sett={};
  // Aggrega per dipendente+settimana tenendo conto degli spezzati
  const perDipData = {};
  getTimbMese().filter(t=>t.tipo==="lavoro").forEach(t=>{
    const key = `${t.dipendenteId}__${t.data}`;
    if(!perDipData[key]) perDipData[key] = { dipendenteId: t.dipendenteId, data: t.data, turni: [] };
    perDipData[key].turni.push(t);
  });

  Object.values(perDipData).forEach(({dipendenteId, data, turni}) => {
    const dip = state.dipendenti.find(d=>d.id===dipendenteId);
    const agg = dip ? aggregaTurniGiorno(turni, dip) : null;
    const min = agg ? agg.calcolo.totaleMin : turni.reduce((s,t)=>s+(t.calcolo?.totaleMin||0),0);
    const d=new Date(data), sw=new Date(d); sw.setDate(d.getDate()-d.getDay()+1);
    const k=sw.toISOString().split("T")[0];
    if(!sett[k]) sett[k]={};
    if(!sett[k][dipendenteId]) sett[k][dipendenteId]=0;
    sett[k][dipendenteId]+=min;
  });

  const keys=Object.keys(sett).sort();
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
      <h2 style="font-size:15px;font-weight:700;color:#374151;margin:0">Riepilogo settimanale</h2>${filtriHTML()}
    </div>
    ${!keys.length?`<div class="empty">Nessun dato per ${MESI[state.filtroMese]} ${state.filtroAnno}</div>`:""}
    ${keys.map(sw=>{
      const fine=new Date(sw); fine.setDate(fine.getDate()+6);
      return `<div style="margin-bottom:14px;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden">
        <div style="background:#fffbeb;padding:8px 14px;font-weight:700;font-size:13px;color:#92400e">Settimana ${sw} → ${fine.toISOString().split("T")[0]}</div>
        <div style="padding:8px 14px">${state.dipendenti.map(dip=>{
          const min=sett[sw]?.[dip.id]||0, str=Math.max(0,min-40*60);
          return `<div style="display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid #f9fafb">
            <span>${dip.nome}</span>
            <div style="display:flex;gap:10px"><span style="font-weight:600">${minToHHMM(min)}h</span>
            ${str>0?`<span style="color:#dc2626;font-weight:600">+${minToHHMM(str)}h STR</span>`:""}</div>
          </div>`;}).join("")}</div>
      </div>`;}).join("")}`;
}

function renderAdminMaggiorazioni() {

      return `
        <div class="cost-card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">

          </div>

          <div class="cost-row"><span style="color:#4f46e5">Ore ordinarie notturne +${MAGGIORAZIONI.ordinarioNotturno*100}% (${r.totOrdNott.toFixed(2)}h)</span><span style="color:#4f46e5">${euro(r.costoOrdNott)}</span></div>
          <div class="cost-row"><span style="color:#ea580c">Straordinari diurni +${MAGGIORAZIONI.strDiurno*100}% (${r.totStrDiurni.toFixed(2)}h)</span><span style="color:#ea580c">${euro(r.costoStrDiurno)}</span></div>
          <div class="cost-row"><span style="color:#dc2626">Straordinari notturni +${MAGGIORAZIONI.strNotturno*100}% (${r.totStrNott.toFixed(2)}h)</span><span style="color:#dc2626">${euro(r.costoStrNott)}</span></div>
          ${r.giorniDomenica>0?`<div class="cost-row"><span style="color:#7c3aed">Maggiorazione domenica +${MAGGIORAZIONI.domenica*100}% (${r.giorniDomenica} giorn${r.giorniDomenica>1?"i":"o"})</span><span style="color:#7c3aed">${euro(r.costoMaggDom)}</span></div>`:""}
          ${r.giorniFestivi>0?`<div class="cost-row"><span style="color:#b45309">Maggiorazione festivo +${MAGGIORAZIONI.festivo*100}% (${r.giorniFestivi} giorn${r.giorniFestivi>1?"i":"o"})</span><span style="color:#b45309">${euro(r.costoMaggFest)}</span></div>`:""}

          ${domeniche.length>0?`<div style="font-size:11px;color:#9ca3af;margin-top:2px">Domeniche: ${domeniche.join(", ")}</div>`:""}
          ${(()=>{
            const ra=calcolaCostoAssenzeMensili(dip.id);

            return `<div style="margin-top:8px;padding-top:8px;border-top:1px dashed #e5e7eb">

                  </div>`;
                }
                return `<div class="cost-row"><span style="color:#3b82f6">${v} (${det.giorni}g × ${ra.oreDip.toFixed(2)}h × €${ra.tariffa})</span><span style="color:#3b82f6">${euro(det.costo)}</span></div>`;
              }).join("")}
            </div>`;
          })()}
          <div class="cost-total">
            <span>Totale ${MESI[state.filtroMese]}</span>
            <span style="color:#059669">${euro(r.totale+(calcolaCostoAssenzeMensili(dip.id)?.totaleCosto||0))}</span>
          </div>
        </div>`;}).join("")}
    <div style="background:#1e293b;color:white;border-radius:10px;padding:16px;margin-top:4px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-weight:700;font-size:15px">Totale costo mensile</span>
      <span style="font-weight:700;font-size:20px;color:#10b981">${euro(state.dipendenti.reduce((s,dip)=>{
        const r=calcolaCostoMensile(dip.id);
        const ra=calcolaCostoAssenzeMensili(dip.id);
        return s+(r?.totale||0)+(ra?.totaleCosto||0);
      },0))}</span>
    </div>`;
}

function calcolaCostoTeoricoGiorno(ds) {
  // Costo teorico = tutti i dipendenti attivi con tariffa * ore soglia
  // (esclusi intermittenti, escluse domeniche per semplicità)
  if(new Date(ds).getDay()===0) return 0;
  return getDipendentiAttivi()
    .filter(d=>d.tariffaOraria&&d.tipo!=="Intermittente")
    .reduce((s,d)=>{
      // Solo se non ha giorno libero
      const haGiornoLibero=state.timbrature.find(t=>t.dipendenteId===d.id&&t.data===ds&&t.tipo==="assenza"&&t.assenza==="Giorno Libero");
      if(haGiornoLibero) return s;
      return s+(sogliaMinutiDip(d)/60)*d.tariffaOraria;
    },0);
}

function renderDettaglioGiorno(dataStr) {
  const timbGiorno=state.timbrature.filter(t=>{
    const okData=t.data===dataStr;
    const okSede=!state.filtroSede||t.sede===state.filtroSede;
    return okData&&okSede;
  });
  if(!timbGiorno.length) return `<div class="empty">Nessuna timbratura per ${dataStr}${state.filtroSede?" ("+state.filtroSede+")":""}.</div>`;

  // Aggrega per dipendente
  const perDip={};
  timbGiorno.forEach(t=>{
    if(!perDip[t.dipendenteId]) perDip[t.dipendenteId]={lavoro:[],assenza:[]};
    if(t.tipo==="lavoro") perDip[t.dipendenteId].lavoro.push(t);
    else perDip[t.dipendenteId].assenza.push(t);
  });

  let totaleGiorno=0;
  const righe=Object.entries(perDip).map(([dipId,{lavoro,assenza}])=>{
    const dip=state.dipendenti.find(d=>d.id===dipId);
    if(!dip) return "";
    let costo=0, dettaglio="";
    if(lavoro.length>0){
      const agg=aggregaTurniGiorno(lavoro,dip);
      if(agg){
        const r=calcolaCostoAggregato(agg.calcolo,dataStr,dip);
        if(r){ costo=r.totale; }
        if(lavoro.length>1){
          dettaglio=`✂️ Spezzato: ${lavoro.map(t=>`${t.entrata}→${t.uscita}`).join(" + ")} (${minToHHMM(agg.calcolo.totaleMin)}h tot.)`;
        } else {
          const t=lavoro[0];
          dettaglio=`${t.entrata}→${t.uscita} (${minToHHMM(agg.calcolo.totaleMin)}h)`;
        }
      }
    }
    let costoAssenza=0;
    assenza.forEach(t=>{
      if(new Date(dataStr).getDay()!==0&&t.assenza!=="Giorno Libero"){
        costoAssenza+=(sogliaMinutiDip(dip)/60)*(dip.tariffaOraria||0);
        dettaglio=t.assenza;
      }
    });
    const costoTotale=costo+costoAssenza;
    totaleGiorno+=costoTotale;
    const costoTeorico=dip.tariffaOraria&&dip.tipo!=="Intermittente"&&new Date(dataStr).getDay()!==0
      ?(sogliaMinutiDip(dip)/60)*dip.tariffaOraria:0;
    const sede=lavoro[0]?.sede||assenza[0]?.sede||"";
    return `<div class="row">
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <span style="font-weight:600">${dip.nome}</span>
        ${sede?`<span class="badge badge-blue">${sede}</span>`:""}
        <span style="color:#6b7280;font-size:12px">${dettaglio}</span>
        ${costoAssenza>0?`<span class="badge" style="background:#fff7ed;color:#ea580c">+${euro(costoAssenza)} ass.</span>`:""}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
        <span style="font-weight:700;color:#059669">${costoTotale>0?euro(costoTotale):"—"}</span>
        ${costoTeorico>0&&costoTotale<costoTeorico?`<span style="font-size:11px;color:#7c3aed">${euro(costoTeorico)} teo.</span>`:""}
      </div>
    </div>`;
  }).join("");

  const totaleReale=Object.values(Object.fromEntries(Object.entries(perDip).map(([id,{lavoro,assenza}])=>{
    const dip=state.dipendenti.find(d=>d.id===id);
    if(!dip?.tariffaOraria) return [id,0];
    let c=0;
    if(lavoro.length>0){const agg=aggregaTurniGiorno(lavoro,dip);if(agg){const r=calcolaCostoAggregato(agg.calcolo,dataStr,dip);if(r)c+=r.totale;}}
    return [id,c];
  }))).reduce((s,v)=>s+v,0);

  return `${righe}
    <div style="background:#1e293b;color:white;border-radius:8px;padding:12px 16px;margin-top:8px">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="font-weight:700">Totale con assenze</span>
        <span style="font-weight:700;color:#10b981">${euro(totaleGiorno)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:13px;opacity:0.8">
        <span>Solo ore lavorate</span>
        <span style="color:#6ee7b7">${euro(totaleReale)}</span>
      </div>
    </div>`;
}

function calcolaBancaOre(dipId) {
  const dip = state.dipendenti.find(d => d.id === dipId);
  if(!dip) return null;
  const soglia = sogliaMinutiDip(dip);
  const tm = getTimbMese();
  const turni = tm.filter(t => t.dipendenteId === dipId && t.tipo === "lavoro");
  const assenze = tm.filter(t => t.dipendenteId === dipId && t.tipo === "assenza");

  const perGiorno = {};
  turni.forEach(t => { if(!perGiorno[t.data]) perGiorno[t.data]=[]; perGiorno[t.data].push(t); });

  const dettaglioGiorni = [];
  let totaleSurplus = 0, totaleDeficit = 0;

  Object.entries(perGiorno).forEach(([data, ts]) => {
    const agg = aggregaTurniGiorno(ts, dip);
    if(!agg) return;
    const oreMin = agg.calcolo.totaleMin;
    // Usa soglia custom del primo turno del giorno se presente
    const sogliaGiorno = sogliaPerTurno(ts[0], dip);
    const diff = oreMin - sogliaGiorno;
    if(diff >= 0) totaleSurplus += diff;
    else totaleDeficit += Math.abs(diff);
    dettaglioGiorni.push({ data, tipo: "lavoro", oreMin, soglia: sogliaGiorno, diff, isSpezzato: ts.length > 1, sogliaCustom: ts[0].sogliaCustom||null });
  });

  const assenzeValide = assenze.filter(a => {
    const dow = new Date(a.data).getDay();
    return dow !== 0 && a.assenza !== "Giorno Libero";
  });
  assenzeValide.forEach(a => {
    dettaglioGiorni.push({ data: a.data, tipo: "assenza", assenza: a.assenza, oreMin: soglia, soglia, diff: 0 });
  });

  dettaglioGiorni.sort((a, b) => a.data.localeCompare(b.data));
  const saldo = totaleSurplus - totaleDeficit;
  return { dip, soglia, dettaglioGiorni, totaleSurplus, totaleDeficit, saldo };
}

      return `
      <div style="border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;margin-bottom:14px">
        <div style="background:#f9fafb;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #e5e7eb;flex-wrap:wrap;gap:8px">
          <div style="font-weight:700;font-size:13px">${b.dip.nome}
            <span style="font-weight:400;color:#6b7280;font-size:11px"> — ${b.dip.tipo} — soglia ${(b.soglia/60).toFixed(2)}h/g</span>
          </div>
          <div style="display:flex;gap:12px;font-size:12px;font-weight:700;flex-wrap:wrap">
            <span style="color:#059669">+${minToHHMM(b.totaleSurplus)}h surplus</span>
            <span style="color:#dc2626">-${minToHHMM(b.totaleDeficit)}h deficit</span>
            <span style="color:${sc};font-size:14px">Saldo: ${b.saldo>=0?"+":""}${minToHHMM(Math.abs(b.saldo))}h</span>
          </div>
        </div>
        <div class="table-scroll" style="overflow-x:auto;padding:10px 14px">
          <table class="scheda-table">
            <thead><tr>
              <th style="text-align:left">Data</th><th>Giorno</th><th>Tipo</th>
              <th>Ore fatte</th><th>Soglia</th><th>Differenza</th>
            </tr></thead>
            <tbody>
            ${b.dettaglioGiorni.map(g => {
              const dow = new Date(g.data).getDay();
              const isFest = isFestivo(g.data);
              const rowbg = isFest ? "#fef2f2" : dow===0 ? "#f5f3ff" : g.diff < 0 ? "#fef9f0" : "";
              const dc = g.diff > 0 ? "#059669" : g.diff < 0 ? "#dc2626" : "#9ca3af";
              const dl = g.diff === 0 ? "—" : (g.diff > 0 ? "+" : "") + minToHHMM(Math.abs(g.diff)) + "h";
              return `<tr style="background:${rowbg}">
                <td style="font-weight:600;font-size:12px">${g.data}</td>
                <td style="font-size:11px">${giorniSettimana[dow]}${isFest?" 🎉":""}</td>
                <td>${g.tipo==="assenza"
                  ? `<span class="badge badge-blue">${g.assenza}</span>`
                  : g.isSpezzato
                    ? `<span class="badge badge-orange">✂️ Spezzato</span>`
                    : `<span class="badge badge-green">Lavoro</span>`}
                </td>
                <td style="font-weight:600">${minToHHMM(g.oreMin)}h</td>
                <td style="color:#6b7280">${minToHHMM(g.soglia)}h</td>
                <td style="font-weight:700;color:${dc}">${dl}</td>
              </tr>`;
            }).join("")}
            </tbody>
            <tfoot>
              <tr style="background:#f9fafb;border-top:2px solid #e5e7eb">
                <td colspan="5" style="font-weight:700;text-align:right;padding-right:12px">Saldo ${MESI[state.filtroMese]}:</td>
                <td style="font-weight:700;font-size:14px;color:${sc}">${b.saldo>=0?"+":""}${minToHHMM(Math.abs(b.saldo))}h</td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>`;
    }).join("")}`;
}

// ── SCHEDA DIPENDENTE: aggrega turni spezzati per giorno ───────
function renderAdminScheda() {
  const dipId=state.schedaDipId||state.dipendenti[0]?.id||"";
  const dip=state.dipendenti.find(d=>d.id===dipId);
  const tm=getTimbMese();
  const turni=tm.filter(t=>t.dipendenteId===dipId&&t.tipo==="lavoro");
  const ass=tm.filter(t=>t.dipendenteId===dipId&&t.tipo==="assenza");

  // Aggrega per giorno per i totali mensili
  const perGiorno={};
  turni.forEach(t=>{ if(!perGiorno[t.data]) perGiorno[t.data]=[]; perGiorno[t.data].push(t); });
  let tot=0, diur=0, nott=0, strD=0, strN=0;
  let nGiorni=0;
  Object.entries(perGiorno).forEach(([data,ts])=>{
    nGiorni++;
    const agg=dip?aggregaTurniGiorno(ts,dip):null;
    if(!agg) return;
    tot+=agg.calcolo.totaleMin;
    diur+=agg.calcolo.diurneMin;
    nott+=agg.calcolo.notturneMin;
    strD+=agg.calcolo.strDiurniMin;
    strN+=agg.calcolo.strNotturniMin;
  });

  const assCnt={}; VOCI_ASSENZA.forEach(v=>{assCnt[v]=ass.filter(a=>a.assenza===v&&new Date(a.data).getDay()!==0).length;});
  const giorniMese=new Date(state.filtroAnno, state.filtroMese+1, 0).getDate();
  const giorniSettimana=["Dom","Lun","Mar","Mer","Gio","Ven","Sab"];

  const righeGiorni=[];
  for(let g=1;g<=giorniMese;g++){
    const ds=`${state.filtroAnno}-${String(state.filtroMese+1).padStart(2,"0")}-${String(g).padStart(2,"0")}`;
    const timbs=tm.filter(t=>t.dipendenteId===dipId&&t.data===ds);
    const turniGiorno=timbs.filter(t=>t.tipo==="lavoro");
    const assGiorno=timbs.find(t=>t.tipo==="assenza");
    const isDom=new Date(ds).getDay()===0, isFest=isFestivo(ds);
    righeGiorni.push({ds, turniGiorno, assGiorno, isDom, isFest, giorno:giorniSettimana[new Date(ds).getDay()]});
  }

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
      <h2 style="font-size:15px;font-weight:700;color:#374151;margin:0">👤 Scheda dipendente</h2>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <select onchange="window.cambiaSchedaDip(this.value)" style="border:1px solid #e5e7eb;border-radius:8px;padding:6px 10px;font-size:13px">
          ${state.dipendenti.map(d=>`<option value="${d.id}"${d.id===dipId?" selected":""}>${d.nome}</option>`).join("")}
        </select>
        ${filtriHTML()}
      </div>
    </div>

    ${dip?`
    <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px;margin-bottom:16px">
      <div style="font-weight:700;font-size:14px;margin-bottom:10px">${dip.nome} — ${MESI[state.filtroMese]} ${state.filtroAnno}</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px">
        ${[
          ["Giorni lav.", nGiorni],
          ["Ore totali", minToHHMM(tot)+"h"],
          ["Ore diurne", minToHHMM(diur)+"h"],
          ["Ore notturne", minToHHMM(nott)+"h"],
          ["Str. diurni", minToHHMM(strD)+"h"],
          ["Str. notturni", minToHHMM(strN)+"h"],
          ["Ferie", assCnt["Ferie"]+"g ("+((assCnt["Ferie"]||0)*(dip.sogliaOre||6.67)).toFixed(1)+"h)"],
          ["Permessi", assCnt["Permesso"]+"g ("+((assCnt["Permesso"]||0)*(dip.sogliaOre||6.67)).toFixed(1)+"h)"],
          ["Malattia", assCnt["Malattia"]+"g ("+((assCnt["Malattia"]||0)*(dip.sogliaOre||6.67)).toFixed(1)+"h)"],
          ["Riposo Comp.", assCnt["Riposo Compensativo"]+"g"],
          ["Giorno Libero", assCnt["Giorno Libero"]+"g"],
        ].map(([l,v])=>`<div style="background:white;border-radius:8px;padding:10px;text-align:center;border:1px solid #e5e7eb">
          <div style="font-size:14px;font-weight:700;color:#1e293b">${v}</div>
          <div style="font-size:11px;color:#6b7280;margin-top:2px">${l}</div>
        </div>`).join("")}
      </div>
    </div>

    <h3 style="font-size:14px;font-weight:700;color:#374151;margin-bottom:10px">📋 Dettaglio giornaliero</h3>
    <div style="overflow-x:auto"><table>
      <thead><tr>
        <th style="text-align:left">Data</th><th>Giorno</th><th>Sede</th><th>Tipo</th>
        <th>Orari</th><th>Ore Tot.</th>
        <th>Diurne</th><th>Notturne</th><th>Str.D</th><th>Str.N</th><th>Assenza</th>
      </tr></thead>
      <tbody>
      ${righeGiorni.map(({ds,turniGiorno,assGiorno,isDom,isFest,giorno})=>{
        const bg=isFest?"#fef2f2":isDom?"#f5f3ff":"";
        if(turniGiorno.length===0&&!assGiorno){
          return `<tr style="background:${bg};opacity:0.4">
            <td style="font-size:12px">${ds}</td>
            <td><span style="font-size:11px">${giorno}</span></td>
            <td colspan="9" style="color:#9ca3af;font-size:12px">${isFest?"🎉 Festivo":isDom?"☀️ Domenica":"—"}</td>
          </tr>`;
        }
        if(assGiorno){
          return `<tr style="background:${bg}">
            <td style="font-weight:600;font-size:12px">${ds}</td>
            <td><span style="font-size:11px">${giorno}${isFest?" 🎉":isDom?" ☀️":""}</span></td>
            <td><span style="font-size:11px">${assGiorno.sede||""}</span></td>
            <td><span class="badge badge-blue">Assenza</span></td>
            <td colspan="6">—</td>
            <td>${assGiorno.assenza}</td>
          </tr>`;
        }
        // Turni (anche spezzati)
        const agg=dip?aggregaTurniGiorno(turniGiorno,dip):null;
        const calcAgg=agg?.calcolo;
        const isSpezzato=turniGiorno.length>1;
        const orariHTML=isSpezzato
          ?turniGiorno.map((t,i)=>`<span style="font-size:11px;display:block">Turno ${i+1}: ${t.entrata}→${t.uscita} (${t.pausa||0}min)</span>`).join("")
          :`${turniGiorno[0].entrata||"—"}→${turniGiorno[0].uscita||"—"} (${turniGiorno[0].pausa||0}min)`;
        const sede=turniGiorno[0]?.sede||"";
        return `<tr style="background:${bg}">
          <td style="font-weight:600;font-size:12px">${ds}</td>
          <td><span style="font-size:11px">${giorno}${isFest?" 🎉":isDom?" ☀️":""}</span></td>
          <td><span style="font-size:11px">${sede}</span></td>
          <td>${isSpezzato?`<span class="badge badge-orange">✂️ Spezzato</span>`:`<span class="badge badge-green">Lavoro</span>`}</td>
          <td style="font-size:11px;text-align:left">${orariHTML}</td>
          <td style="font-weight:700">${calcAgg?minToHHMM(calcAgg.totaleMin)+"h":"—"}</td>
          <td>${calcAgg?minToHHMM(calcAgg.diurneMin)+"h":"—"}</td>
          <td style="color:#4f46e5">${calcAgg&&calcAgg.notturneMin>0?minToHHMM(calcAgg.notturneMin)+"h":"—"}</td>
          <td style="color:#ea580c">${calcAgg&&calcAgg.strDiurniMin>0?minToHHMM(calcAgg.strDiurniMin)+"h":"—"}</td>
          <td style="color:#dc2626">${calcAgg&&calcAgg.strNotturniMin>0?minToHHMM(calcAgg.strNotturniMin)+"h":"—"}</td>
          <td>—</td>
        </tr>`;
      }).join("")}
      </tbody>
    </table></div>`:`<div class="empty">Nessun dipendente trovato.</div>`}`;
}

function esportaCSV() {
  const tm=getTimbMese();
  const righe=[["Dipendente","Tipo","Data","Giorno","Entrata","Uscita","Pausa","Ore Tot.","Diurne","Notturne","Str.Diurni","Str.Nott.","Assenza","Costo Totale","Spezzato"]];
  // Aggrega per dipendente+data
  const perDipData={};
  tm.filter(t=>t.tipo==="lavoro").forEach(t=>{
    const k=`${t.dipendenteId}__${t.data}`;
    if(!perDipData[k]) perDipData[k]={dip:state.dipendenti.find(d=>d.id===t.dipendenteId),data:t.data,turni:[]};
    perDipData[k].turni.push(t);
  });
  Object.values(perDipData).forEach(({dip,data,turni})=>{
    if(!dip) return;
    const agg=aggregaTurniGiorno(turni,dip);
    if(!agg) return;
    const c=agg.calcolo, tipo=getTipoGiorno(data);
    const costo=calcolaCostoAggregato(c,data,dip);
    const isSpezzato=turni.length>1;
    const orari=isSpezzato?turni.map(t=>`${t.entrata}→${t.uscita}`).join(" + "):`${turni[0].entrata||""}→${turni[0].uscita||""}`;
    righe.push([dip.nome,dip.tipo,data,tipo,orari,"",isSpezzato?turni.reduce((s,t)=>s+(t.pausa||0),0):"",
      minToHHMM(c.totaleMin),minToHHMM(c.diurneMin),minToHHMM(c.notturneMin),
      minToHHMM(c.strDiurniMin),minToHHMM(c.strNotturniMin),"",
      costo?costo.totale.toFixed(2):"",isSpezzato?"Sì":"No"]);
  });
  tm.filter(t=>t.tipo==="assenza").forEach(t=>{
    const dip=state.dipendenti.find(x=>x.id===t.dipendenteId);
    righe.push([dip?.nome||"",dip?.tipo||"",t.data,getTipoGiorno(t.data),"","","","","","","","",t.assenza||"","","No"]);
  });
  const csv=righe.map(r=>r.map(c=>`"${c}"`).join(",")).join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"}));
  a.download=`timbrature_${MESI[state.filtroMese]}_${state.filtroAnno}.csv`; a.click();
}

function esportaExcel() {
  const tm=getTimbMese();
  const wb=XLSX.utils.book_new();

  // ── FOGLIO 1: RIEPILOGO ──
  const righeRiepilogo=[["Dipendente","Contratto","Giorni Lav.","Ore Totali","Ore Diurne","Ore Notturne","Str.Diurni","Str.Notturni","Ferie (h)","Permessi (h)","Malattia (h)","Riposo Comp. (h)","Giorno Libero (h)"]];
  state.dipendenti.forEach(dip=>{
    const r=getRiepilogo().find(x=>x.dip.id===dip.id);
    if(!r) return;
    const ass=tm.filter(t=>t.dipendenteId===dip.id&&t.tipo==="assenza");
    righeRiepilogo.push([dip.nome,dip.tipo,r.nTurni,minToHHMM(r.tot),minToHHMM(r.diur),minToHHMM(r.nott),minToHHMM(r.strD),minToHHMM(r.strN),
      ass.filter(a=>a.assenza==="Ferie").length*(dip.sogliaOre||6.67),
      ass.filter(a=>a.assenza==="Permesso").length*(dip.sogliaOre||6.67),
      ass.filter(a=>a.assenza==="Malattia").length*(dip.sogliaOre||6.67),
      ass.filter(a=>a.assenza==="Riposo Compensativo").length*(dip.sogliaOre||6.67),
      ass.filter(a=>a.assenza==="Giorno Libero").length*(dip.sogliaOre||6.67),
    ]);
  });
  const ws1=XLSX.utils.aoa_to_sheet(righeRiepilogo);
  ws1["!cols"]=[{wch:20},{wch:14},{wch:10},{wch:10},{wch:10},{wch:11},{wch:11},{wch:12},{wch:7},{wch:9},{wch:9},{wch:13},{wch:13}];
  XLSX.utils.book_append_sheet(wb,ws1,"Riepilogo");

  // ── FOGLIO 2: DETTAGLIO (aggregato per giorno) ──
  const righeDettaglio=[["Dipendente","Data","Giorno","Sede","Tipo","Orari","Pausa Tot.(min)","Ore Totali","Ore Diurne","Ore Notturne","Str.Diurni","Str.Notturni","Assenza","Spezzato"]];
  const giorniSettimana=["Domenica","Lunedì","Martedì","Mercoledì","Giovedì","Venerdì","Sabato"];

  // Aggrega lavoro per dipendente+data
  const perDipData={};
  tm.filter(t=>t.tipo==="lavoro").forEach(t=>{
    const k=`${t.dipendenteId}__${t.data}`;
    if(!perDipData[k]) perDipData[k]={dip:state.dipendenti.find(d=>d.id===t.dipendenteId),data:t.data,turni:[],sede:t.sede||""};
    perDipData[k].turni.push(t);
  });
  Object.values(perDipData).sort((a,b)=>a.data.localeCompare(b.data)).forEach(({dip,data,turni,sede})=>{
    if(!dip) return;
    const agg=aggregaTurniGiorno(turni,dip);
    if(!agg) return;
    const c=agg.calcolo;
    const isSpezzato=turni.length>1;
    const orari=isSpezzato?turni.map(t=>`${t.entrata}→${t.uscita}`).join(" + "):`${turni[0].entrata||""}→${turni[0].uscita||""}`;
    const pausaTot=turni.reduce((s,t)=>s+(t.pausa||0),0);
    righeDettaglio.push([dip.nome,data,giorniSettimana[new Date(data).getDay()],sede,"Lavoro",orari,pausaTot,
      minToHHMM(c.totaleMin),minToHHMM(c.diurneMin),minToHHMM(c.notturneMin),
      minToHHMM(c.strDiurniMin),minToHHMM(c.strNotturniMin),"",isSpezzato?"Sì":"No"]);
  });
  tm.filter(t=>t.tipo==="assenza").sort((a,b)=>a.data.localeCompare(b.data)).forEach(t=>{
    const dip=state.dipendenti.find(d=>d.id===t.dipendenteId);
    righeDettaglio.push([dip?.nome||"",t.data,giorniSettimana[new Date(t.data).getDay()],t.sede||"","Assenza","","","","","","","",t.assenza||"","No"]);
  });
  const ws2=XLSX.utils.aoa_to_sheet(righeDettaglio);
  ws2["!cols"]=[{wch:20},{wch:12},{wch:12},{wch:16},{wch:9},{wch:24},{wch:14},{wch:10},{wch:10},{wch:11},{wch:11},{wch:12},{wch:20},{wch:8}];
  XLSX.utils.book_append_sheet(wb,ws2,"Dettaglio");

  XLSX.writeFile(wb,`timbrature_${MESI[state.filtroMese]}_${state.filtroAnno}.xlsx`);
}

function renderCalendarioMultiplo(prefisso) {
  const meseEl = document.getElementById(`${prefisso}-mese-multiplo`);
  const meseVal = meseEl?.value || (new Date().getFullYear()+"-"+String(new Date().getMonth()+1).padStart(2,"0"));
  const [anno, meseN] = meseVal.split("-").map(Number);
  const mese = meseN - 1; // 0-based
  const primoGiorno = new Date(anno, mese, 1).getDay();
  const giorniMese = new Date(anno, mese+1, 0).getDate();
  const giorni=["Lu","Ma","Me","Gi","Ve","Sa","Do"];
  let html=`<div style="font-size:13px;font-weight:700;color:#374151;margin-bottom:8px;text-align:center">${MESI[mese]} ${anno}</div>`;
  html+=`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center">`;
  giorni.forEach(g=>html+=`<div style="font-size:11px;font-weight:700;color:#9ca3af;padding:3px">${g}</div>`);
  const offset=(primoGiorno+6)%7;
  for(let i=0;i<offset;i++) html+=`<div></div>`;
  const set=window._dateSelezionate?.[prefisso]||new Set();
  for(let g=1;g<=giorniMese;g++){
    const ds=`${anno}-${String(mese+1).padStart(2,"0")}-${String(g).padStart(2,"0")}`;
    const sel=set.has(ds);
    html+=`<div id="${prefisso}-giorno-${ds}" onclick="toggleGiorno('${prefisso}','${ds}')" style="cursor:pointer;padding:5px 2px;border-radius:6px;font-size:13px;border:1px solid ${sel?"#f59e0b":"#e5e7eb"};background:${sel?"#f59e0b":"white"};color:${sel?"white":"inherit"}" data-data="${ds}">${g}</div>`;
  }
  const dateList=[...set].sort().filter(d=>d.startsWith(`${anno}-${String(mese+1).padStart(2,"0")}`));
  html+=`</div><div id="${prefisso}-date-selezionate" style="margin-top:8px;font-size:12px;color:#6b7280">${set.size>0?`${set.size} date selezionate: ${[...set].sort().join(", ")}`:"Nessuna data selezionata"}</div>`;
  return html;
}

window._dateSelezionate={dip:new Set(),admin:new Set()};

window.aggiornaMeseMultiplo=function(prefisso){
  window._dateSelezionate[prefisso]=new Set(); // reset selezione al cambio mese
  const el=document.getElementById(`${prefisso}-calendario-multiplo`);
  if(el) el.innerHTML=renderCalendarioMultiplo(prefisso);
};

window.toggleGiorno=function(prefisso,data){
  const set=window._dateSelezionate[prefisso];
  const el=document.getElementById(`${prefisso}-giorno-${data}`);
  if(!el) return;
  if(set.has(data)){set.delete(data);el.style.background="white";el.style.color="inherit";el.style.borderColor="#e5e7eb";}
  else{set.add(data);el.style.background="#f59e0b";el.style.color="white";el.style.borderColor="#f59e0b";}
  const info=document.getElementById(`${prefisso}-date-selezionate`);
  if(info) info.textContent=set.size>0?`${set.size} date selezionate: ${[...set].sort().join(", ")}`:"Nessuna data selezionata";
};

window.toggleModoAssenza=function(prefisso){
  const modo=document.getElementById(`${prefisso==="dip"?"inp":"ai"}-modo-assenza`)?.value;
  const s=document.getElementById(`${prefisso}-assenza-singola`);
  const i=document.getElementById(`${prefisso}-assenza-intervallo`);
  const m=document.getElementById(`${prefisso}-assenza-multipla`);
  if(s) s.style.display=modo==="singola"?"grid":"none";
  if(i) i.style.display=modo==="intervallo"?"block":"none";
  if(m) m.style.display=modo==="multipla"?"block":"none";
  if(modo==="multipla") window._dateSelezionate[prefisso]=new Set();
};

function dateIntervallo(da,a){
  const dates=[]; const cur=new Date(da); const fine=new Date(a);
  while(cur<=fine){dates.push(cur.toISOString().split("T")[0]);cur.setDate(cur.getDate()+1);}
  return dates;
}

function getDateAssenza(prefisso){
  const modoId=prefisso==="dip"?"inp-modo-assenza":"ai-modo-assenza";
  const modo=document.getElementById(modoId)?.value||"singola";
  if(modo==="singola"){const id=prefisso==="dip"?"inp-data-assenza":"ai-data-assenza";const v=document.getElementById(id)?.value;return v?[v]:[];}
  if(modo==="intervallo"){
    const da=document.getElementById(`${prefisso==="dip"?"inp":"ai"}-data-ass-da`)?.value;
    const a=document.getElementById(`${prefisso==="dip"?"inp":"ai"}-data-ass-a`)?.value;
    if(!da||!a||da>a){alert("Intervallo date non valido!");return [];}
    return dateIntervallo(da,a);
  }
  if(modo==="multipla"){const dates=[...window._dateSelezionate[prefisso]].sort();if(!dates.length){alert("Seleziona almeno una data!");return [];}return dates;}
  return [];
}
